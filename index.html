<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>AlpEditör Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        /* 1. ANA TEMALANDIRMA (Senin Orijinal Renklerin) */
        :root {
            --ios-bg: #f2f2f7;
            --ios-header: rgba(248, 248, 248, 0.85);
            --ios-blue: #007AFF;
            --ios-border: #c6c6c8;
            --ios-text: #000000;
            --ios-menu-bg: rgba(250, 250, 250, 0.95);
            --ios-tab-bg: #e5e5ea;
            --ios-tab-active: #ffffff;
            --ios-line-num: #8e8e93;
            --ios-line-bg: #f8f8f8;
            --editor-font-size: 14px; 
            --editor-font-family: ui-monospace, 'SF Mono', Menlo, Monaco, Consolas, "Courier New", monospace;
            --glass: blur(20px) saturate(180%);
        }

        body.dark-theme {
            --ios-bg: #1e1e1e;
            --ios-header: rgba(28, 28, 30, 0.95);
            --ios-blue: #0a84ff;
            --ios-border: #38383a;
            --ios-text: #d4d4d4;
            --ios-menu-bg: rgba(40, 40, 40, 0.95);
            --ios-tab-bg: #252526;
            --ios-tab-active: #1e1e1e;
            --ios-line-num: #858585;
            --ios-line-bg: #1e1e1e;
        }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--ios-bg); color: var(--ios-text);
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
            -webkit-tap-highlight-color: transparent; transition: background-color 0.3s, color 0.3s;
        }

        /* 2. HEADER & GLASSMORPHISM */
        header {
            background-color: var(--ios-header);
            backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass);
            border-bottom: 1px solid var(--ios-border);
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 15px; padding-top: max(15px, env(safe-area-inset-top)); 
            position: relative; z-index: 100;
        }

        .file-name { font-size: 17px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 50%; }
        .btn-icon { color: var(--ios-blue); background: transparent; border: none; font-size: 24px; font-weight: bold; cursor: pointer; padding: 0 5px; line-height: 1; }

        /* 3. MENÜLER & POPUPLAR */
        .dropdown-menu, .popup-window, .ios-context-menu {
            background-color: var(--ios-menu-bg);
            backdrop-filter: var(--glass); -webkit-backdrop-filter: var(--glass);
            border-radius: 12px; border: 1px solid var(--ios-border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3); display: none;
        }

        .dropdown-menu { position: absolute; top: calc(100% + 5px); right: 10px; flex-direction: column; overflow: hidden; z-index: 500; }
        .dropdown-menu.active { display: flex; }
        .dropdown-menu button { background: transparent; border: none; border-bottom: 1px solid var(--ios-border); padding: 12px 20px; font-size: 16px; color: var(--ios-blue); text-align: left; width: 180px; cursor: pointer; }
        .dropdown-menu button.action-btn { color: var(--ios-text); }
        .dropdown-menu button:last-child { border-bottom: none; }
        .menu-divider { height: 4px; background-color: var(--ios-border); border:none; padding:0; }

        /* 4. SEKMELER */
        .tabs-container { display: flex; background-color: var(--ios-header); border-bottom: 1px solid var(--ios-border); overflow-x: auto; scrollbar-width: none; }
        .tabs-container::-webkit-scrollbar { display: none; } 
        .tab { padding: 10px 15px; font-size: 14px; color: var(--ios-text); background-color: var(--ios-tab-bg); border-right: 1px solid var(--ios-border); white-space: nowrap; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .tab.active { background-color: var(--ios-tab-active); font-weight: 600; border-bottom: 2px solid var(--ios-blue); }
        .tab-close { color: var(--ios-line-num); font-weight: bold; padding: 2px; }

        /* 5. EDİTÖR ALANI */
        .editor-wrapper { display: flex; flex: 1; overflow: hidden; background-color: var(--ios-bg); position: relative; }
        .line-numbers {
            width: 45px; padding: 15px 5px; font-family: var(--editor-font-family);
            font-size: var(--editor-font-size); line-height: 1.6;
            color: var(--ios-line-num); text-align: right; background-color: var(--ios-line-bg);
            overflow: hidden; user-select: none; opacity: 0.6;
        }
        textarea {
            flex: 1; width: 100%; border: none; padding: 15px 10px;
            font-size: var(--editor-font-size); line-height: 1.6;
            font-family: var(--editor-font-family); background-color: transparent;
            color: var(--ios-text); resize: none; outline: none; white-space: pre; overflow-y: auto;
        }

        /* 6. MOBİL ARAÇ ÇUBUĞU */
        .toolbar { display: flex; background: var(--ios-header); border-top: 1px solid var(--ios-border); overflow-x: auto; padding: 8px; gap: 6px; scrollbar-width: none; }
        .toolbar::-webkit-scrollbar { display: none; }
        .toolbar button { background: var(--ios-tab-bg); color: var(--ios-text); border: 1px solid var(--ios-border); border-radius: 8px; padding: 10px 14px; min-width: 44px; font-family: monospace; font-size: 16px; }

        /* 7. ÖNİZLEME (PREVIEW) - MODERN srcdoc */
        #previewContainer { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: white; z-index: 9999; flex-direction: column; }
        #previewFrame { flex: 1; width: 100%; border: none; background: white; }
        #previewHeader { background: #f8f8f8; border-bottom: 1px solid #ddd; padding: 10px; display: flex; justify-content: space-between; align-items: center; color: black; }

        /* 8. POPUPLAR (Bul-Değiştir & Yazı Boyutu) */
        .popup-window { position: fixed; top: 100px; left: 50%; transform: translateX(-50%); padding: 15px; flex-direction: column; gap: 10px; z-index: 1000; align-items: center; }
        .popup-window.active { display: flex; }
        .popup-window input { padding: 10px; border-radius: 8px; border: 1px solid var(--ios-border); background: var(--ios-bg); color: var(--ios-text); width: 220px; font-size: 16px; }

        /* 9. SAĞ TIK MENÜSÜ */
        .ios-context-menu { position: absolute; flex-direction: row; padding: 0; z-index: 1500; }
        .ios-context-menu.active { display: flex; }
        .ios-context-menu button { background: none; border: none; color: var(--ios-text); font-size: 14px; padding: 10px 14px; white-space: nowrap; cursor: pointer; }
        .ios-context-menu .divider { width: 1px; background-color: var(--ios-border); margin: 5px 0; }
        
        input[type="file"] { display: none; }
    </style>
</head>
<body class="dark-theme">

<header>
    <div class="file-name" id="fileNameDisplay">İsimsiz.html</div>
    <div style="display:flex; gap:10px;">
        <button class="btn-icon" id="btnRun" title="Çalıştır">▶️</button>
        <button class="btn-icon" id="btnMenuToggle">•••</button>
    </div>
    
    <div class="dropdown-menu" id="mainMenu">
        <button id="menuOpen">Aç</button>
        <button id="menuSave">Kaydet</button>
        <button id="menuSaveAs">Farklı Kaydet</button>
        <button id="menuUndo">Geri Al</button>
        <button id="menuRedo">İleri Al</button>
        <button id="menuFontSize">Yazı Boyutu</button> 
        <button id="menuTheme">Tema Değiştir</button>
        <div class="menu-divider"></div>
        <button id="menuCtxCut" class="action-btn">Kes</button>
        <button id="menuCtxCopy" class="action-btn">Kopyala</button>
        <button id="menuCtxPaste" class="action-btn">Yapıştır</button>
        <button id="menuCtxSelectAll" class="action-btn">Tümünü Seç</button>
    </div>
</header>

<div class="tabs-container">
    <div id="tabsList" style="display:flex;"></div>
    <button class="add-tab-btn" id="btnAddTab" style="padding:10px 15px; color:var(--ios-blue); border:none; background:none; font-size:20px;">+</button>
</div>

<div class="editor-wrapper">
    <div class="line-numbers" id="lineNumbers">1</div>
    <textarea id="editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="none" wrap="off"></textarea>
</div>

<div class="toolbar" id="toolbar">
    <button onclick="insertAtCursor('\t')">TAB</button>
    <button onclick="insertAtCursor('<')">&lt;</button>
    <button onclick="insertAtCursor('>')">&gt;</button>
    <button onclick="insertAtCursor('/')">/</button>
    <button onclick="insertAtCursor('{')">{</button>
    <button onclick="insertAtCursor('}')">}</button>
    <button onclick="insertAtCursor('(')">(</button>
    <button onclick="insertAtCursor(')')">)</button>
    <button onclick="insertAtCursor(';')">;</button>
    <button onclick="insertAtCursor('=')">=</button>
</div>

<div class="popup-window" id="searchPopup">
    <input type="text" id="searchInput" placeholder="Aranacak...">
    <input type="text" id="replaceInput" placeholder="Yeni kelime...">
    <div style="display:flex; gap:10px;">
        <button id="btnSearchNext" style="color:var(--ios-blue); background:none; border:none; font-weight:bold;">Bul</button>
        <button id="btnReplaceAll" style="color:var(--ios-blue); background:none; border:none; font-weight:bold;">Tümünü Değiştir</button>
    </div>
    <button id="btnSearchClose" style="color:red; background:none; border:none;">Kapat</button>
</div>

<div class="popup-window" id="fontSizePopup">
    <div style="display:flex; align-items:center; gap:15px;">
        <button id="btnFontDec" style="width:40px; height:40px; border-radius:8px;">-</button>
        <span id="fontSizeDisplay" style="font-weight:bold;">14px</span>
        <button id="btnFontInc" style="width:40px; height:40px; border-radius:8px;">+</button>
    </div>
    <button id="btnFontClose" style="color:red; background:none; border:none; margin-top:10px;">Kapat</button>
</div>

<div id="previewContainer">
    <div id="previewHeader">
        <span style="font-weight:bold;">Canlı Önizleme</span>
        <button id="closePreview" style="background:red; color:white; border:none; padding:5px 15px; border-radius:5px;">Kapat</button>
    </div>
    <iframe id="previewFrame"></iframe>
</div>

<input type="file" id="fileInput" accept=".txt,.html,.js,.css,.json">

<div id="iosMenu" class="ios-context-menu">
    <button id="ctxSearch">Ara</button>
    <div class="divider"></div>
    <button id="ctxCopy">Kopya</button>
    <div class="divider"></div>
    <button id="ctxPaste">Yapıştır</button>
</div>

<script>
    const editor = document.getElementById('editor');
    const lineNumbers = document.getElementById('lineNumbers');
    const fileNameDisplay = document.getElementById('fileNameDisplay');
    const fileInput = document.getElementById('fileInput');
    const mainMenu = document.getElementById('mainMenu');
    const tabsList = document.getElementById('tabsList');
    
    let tabs = [];
    let activeTabId = null;
    let tabCounter = 0;
    let isProgrammaticChange = false;

    // --- 1. OTOMATİK TAMAMLAMA & TAB ---
    editor.addEventListener('keydown', function(e) {
        if (e.key === 'Tab') {
            e.preventDefault();
            insertAtCursor('\t');
        }
        const pairs = { '{': '}', '(': ')', '[': ']', '"': '"', "'": "'" };
        if (pairs[e.key]) {
            e.preventDefault();
            const start = this.selectionStart;
            this.setRangeText(e.key + pairs[e.key], start, this.selectionEnd, 'end');
            this.selectionStart = this.selectionEnd = start + 1;
        }
    });

    function insertAtCursor(text) {
        const start = editor.selectionStart;
        editor.setRangeText(text, start, editor.selectionEnd, 'end');
        editor.focus();
        handleEditorInput();
    }

    // --- 2. SEKME YÖNETİMİ (Korumalı) ---
    function createTab(name = "İsimsiz.html", content = "") {
        tabCounter++;
        const id = tabCounter;
        tabs.push({ id, name, content, history: [content], historyIndex: 0 });
        renderTabs();
        switchTab(id);
    }

    function renderTabs() {
        tabsList.innerHTML = '';
        tabs.forEach(tab => {
            const tabEl = document.createElement('div');
            tabEl.className = `tab ${tab.id === activeTabId ? 'active' : ''}`;
            tabEl.innerHTML = `<span>${tab.name}</span><span class="tab-close" data-id="${tab.id}">×</span>`;
            tabEl.onclick = () => switchTab(tab.id);
            tabEl.querySelector('.tab-close').onclick = (e) => { e.stopPropagation(); closeTab(tab.id); };
            tabsList.appendChild(tabEl);
        });
    }

    function switchTab(id) {
        if (activeTabId !== null) {
            const currentTab = tabs.find(t => t.id === activeTabId);
            if(currentTab) currentTab.content = editor.value;
        }
        activeTabId = id;
        const newTab = tabs.find(t => t.id === id);
        isProgrammaticChange = true;
        editor.value = newTab.content;
        fileNameDisplay.textContent = newTab.name;
        renderTabs();
        updateLines();
    }

    function closeTab(id) {
        if (tabs.length === 1) return;
        tabs = tabs.filter(t => t.id !== id);
        if (activeTabId === id) switchTab(tabs[tabs.length - 1].id);
        else renderTabs();
    }
    document.getElementById('btnAddTab').onclick = () => createTab();

    // --- 3. EDİTÖR GÜNCELLEME ---
    function updateLines() {
        const count = editor.value.split('\n').length;
        lineNumbers.innerHTML = Array.from({length: count}, (_, i) => i + 1).join('<br>');
    }

    function handleEditorInput() {
        updateLines();
        const active = tabs.find(t => t.id === activeTabId);
        if (!isProgrammaticChange && active) {
            if (active.historyIndex < active.history.length - 1) {
                active.history = active.history.slice(0, active.historyIndex + 1);
            }
            active.history.push(editor.value);
            active.historyIndex++;
        }
        isProgrammaticChange = false;
    }

    editor.addEventListener('input', handleEditorInput);
    editor.addEventListener('scroll', () => {
        lineNumbers.scrollTop = editor.scrollTop;
    });

    // --- 4. CANLI ÖNİZLEME (srcdoc Çözümü) ---
    document.getElementById('btnRun').onclick = () => {
        const frame = document.getElementById('previewFrame');
        document.getElementById('previewContainer').style.display = 'flex';
        frame.srcdoc = editor.value;
    };
    document.getElementById('closePreview').onclick = () => {
        document.getElementById('previewContainer').style.display = 'none';
        document.getElementById('previewFrame').srcdoc = '';
    };

    // --- 5. BUL & DEĞİŞTİR ---
    let searchIdx = 0;
    document.getElementById('btnSearchNext').onclick = () => {
        const word = document.getElementById('searchInput').value.toLowerCase();
        if (!word) return;
        const idx = editor.value.toLowerCase().indexOf(word, searchIdx);
        if (idx !== -1) {
            editor.focus();
            editor.setSelectionRange(idx, idx + word.length);
            searchIdx = idx + word.length;
        } else { searchIdx = 0; alert("Kelime bitti."); }
    };
    document.getElementById('btnReplaceAll').onclick = () => {
        const s = document.getElementById('searchInput').value;
        const r = document.getElementById('replaceInput').value;
        if (s) { editor.value = editor.value.split(s).join(r); handleEditorInput(); }
    };

    // --- 6. MENÜLER & TEMA & AYARLAR ---
    document.getElementById('btnMenuToggle').onclick = (e) => { e.stopPropagation(); mainMenu.classList.toggle('active'); };
    window.onclick = () => { mainMenu.classList.remove('active'); document.getElementById('iosMenu').classList.remove('active'); };

    document.getElementById('menuTheme').onclick = () => {
        document.body.classList.toggle('dark-theme');
        localStorage.setItem('alpEditorTheme', document.body.classList.contains('dark-theme') ? 'dark' : 'light');
    };
    if(localStorage.getItem('alpEditorTheme') === 'light') document.body.classList.remove('dark-theme');

    // Yazı Boyutu Fonksiyonları (Senin Orijinal Yapın)
    let curFS = parseInt(localStorage.getItem('alpEditorFontSize')) || 14;
    function setFS(s) {
        curFS = s;
        document.documentElement.style.setProperty('--editor-font-size', s + 'px');
        document.getElementById('fontSizeDisplay').textContent = s + 'px';
        localStorage.setItem('alpEditorFontSize', s);
    }
    document.getElementById('menuFontSize').onclick = () => document.getElementById('fontSizePopup').classList.add('active');
    document.getElementById('btnFontInc').onclick = () => setFS(curFS + 1);
    document.getElementById('btnFontDec').onclick = () => setFS(curFS - 1);
    document.getElementById('btnFontClose').onclick = () => document.getElementById('fontSizePopup').classList.remove('active');

    // Dosya İşlemleri (Aç/Kaydet)
    document.getElementById('menuOpen').onclick = () => fileInput.click();
    fileInput.onchange = (e) => {
        const f = e.target.files[0];
        if(!f) return;
        const r = new FileReader();
        r.onload = (ev) => {
            const active = tabs.find(t => t.id === activeTabId);
            active.name = f.name;
            active.content = ev.target.result;
            switchTab(active.id);
        };
        r.readAsText(f);
    };
    document.getElementById('menuSave').onclick = () => {
        const active = tabs.find(t => t.id === activeTabId);
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([editor.value], {type:'text/plain'}));
        a.download = active.name;
        a.click();
    };
    document.getElementById('menuSaveAs').onclick = () => {
        const active = tabs.find(t => t.id === activeTabId);
        const name = prompt("Dosya adı:", active.name);
        if(name) { active.name = name; fileNameDisplay.textContent = name; renderTabs(); }
    };

    // İleri / Geri Al
    document.getElementById('menuUndo').onclick = () => {
        const active = tabs.find(t => t.id === activeTabId);
        if(active && active.historyIndex > 0) {
            active.historyIndex--;
            isProgrammaticChange = true;
            editor.value = active.history[active.historyIndex];
            updateLines();
        }
    };
    document.getElementById('menuRedo').onclick = () => {
        const active = tabs.find(t => t.id === activeTabId);
        if(active && active.historyIndex < active.history.length - 1) {
            active.historyIndex++;
            isProgrammaticChange = true;
            editor.value = active.history[active.historyIndex];
            updateLines();
        }
    };

    // --- 7. SAĞ TIK MENÜSÜ & KES/KOPYALA/YAPIŞTIR ---
    editor.oncontextmenu = (e) => {
        e.preventDefault();
        const m = document.getElementById('iosMenu');
        m.style.left = e.pageX + 'px';
        m.style.top = (e.pageY - 40) + 'px';
        m.classList.add('active');
    };
    document.getElementById('ctxSearch').onclick = () => document.getElementById('searchPopup').classList.add('active');
    document.getElementById('ctxCopy').onclick = () => navigator.clipboard.writeText(editor.value.substring(editor.selectionStart, editor.selectionEnd));
    document.getElementById('ctxPaste').onclick = async () => {
        const text = await navigator.clipboard.readText();
        editor.setRangeText(text, editor.selectionStart, editor.selectionEnd, 'end');
        handleEditorInput();
    };

    // Ana Menüdeki Kes/Kopyala/Yapıştır/Seç
    document.getElementById('menuCtxCut').onclick = () => {
        const sel = editor.value.substring(editor.selectionStart, editor.selectionEnd);
        navigator.clipboard.writeText(sel);
        editor.setRangeText('', editor.selectionStart, editor.selectionEnd, 'end');
        handleEditorInput();
    };
    document.getElementById('menuCtxCopy').onclick = () => navigator.clipboard.writeText(editor.value.substring(editor.selectionStart, editor.selectionEnd));
    document.getElementById('menuCtxPaste').onclick = async () => {
        const text = await navigator.clipboard.readText();
        editor.setRangeText(text, editor.selectionStart, editor.selectionEnd, 'end');
        handleEditorInput();
    };
    document.getElementById('menuCtxSelectAll').onclick = () => editor.select();

    // Başlangıç Kurulumu
    setFS(curFS);
    createTab();
</script>
</body>
</html>
