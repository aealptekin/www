<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>AlpEditör Ultimate</title>

<style>
:root{
--bg:#f2f2f7; --header:#f8f8f8; --blue:#007AFF; --border:#c6c6c8;
--text:#000; --menu:rgba(255,255,255,0.9);
--tab:#e5e5ea; --tabActive:#fff; --line:#8e8e93;
--fs:16px;
}
body.dark{
--bg:#000; --header:#1c1c1e; --blue:#0a84ff; --border:#38383a;
--text:#fff; --menu:rgba(44,44,46,.95);
--tab:#2c2c2e; --tabActive:#000; --line:#636366;
}

body{
margin:0;height:100vh;display:flex;flex-direction:column;
background:var(--bg);color:var(--text);
font-family:-apple-system;
}

/* HEADER */
header{
display:flex;justify-content:space-between;align-items:center;
padding:10px 15px;background:var(--header);
border-bottom:1px solid var(--border);
}
.file{font-weight:600;overflow:hidden}
.btn{background:none;border:none;font-size:22px;color:var(--blue)}

/* MENU */
.menu{
position:absolute;top:60px;right:10px;
background:var(--menu);
backdrop-filter:blur(20px);
border:1px solid var(--border);
border-radius:12px;
display:none;flex-direction:column;
}
.menu button{
border:none;background:none;
padding:12px 18px;text-align:left;color:var(--blue)
}
.menu.active{display:flex}

/* TABS */
.tabs{display:flex;background:var(--header);overflow:auto}
.tab{
padding:8px 12px;background:var(--tab);
border-right:1px solid var(--border);
cursor:pointer
}
.tab.active{background:var(--tabActive);font-weight:bold}

/* EDITOR */
.wrap{flex:1;display:flex}
.lines{
width:45px;padding:10px;
background:var(--header);
color:var(--line);
font-family:monospace;
text-align:right
}
textarea{
flex:1;border:none;outline:none;
padding:10px;font-family:monospace;
font-size:var(--fs);
background:transparent;color:var(--text)
}

/* TOOLBAR */
.bar{display:flex;gap:5px;padding:5px;background:var(--header)}
.bar button{padding:8px}

/* POPUP */
.popup{
position:fixed;top:50%;left:50%;
transform:translate(-50%,-50%);
background:var(--menu);
padding:20px;border-radius:12px;
display:none;flex-direction:column;gap:10px
}
.popup.active{display:flex}

/* CONTEXT */
.ctx{
position:fixed;
background:var(--menu);
display:none;gap:5px;
padding:5px;border-radius:10px
}
.ctx.active{display:flex}

/* PREVIEW */
#preview{
position:fixed;top:0;left:0;width:100%;height:100%;
background:#fff;display:none;flex-direction:column
}
</style>
</head>

<body class="dark">

<header>
<div class="file" id="file">İsimsiz.html</div>
<div>
<button class="btn" id="run">▶️</button>
<button class="btn" id="menuBtn">•••</button>
</div>

<div class="menu" id="menu">
<button onclick="openFile()">Aç</button>
<button onclick="save(false)">Kaydet</button>
<button onclick="save(true)">Farklı Kaydet</button>
<button onclick="undo()">Geri Al</button>
<button onclick="redo()">İleri Al</button>
<button onclick="searchBox()">Ara</button>
<button onclick="fontBox()">Yazı Boyutu</button>
<button onclick="toggleTheme()">Tema</button>
</div>
</header>

<div class="tabs" id="tabs"></div>

<div class="wrap">
<div class="lines" id="lines">1</div>
<textarea id="ed"></textarea>
</div>

<div class="bar">
<button onclick="ins('<')">&lt;</button>
<button onclick="ins('>')">&gt;</button>
<button onclick="ins('/')">/</button>
<button onclick="ins('{}')">{}</button>
</div>

<div class="ctx" id="ctx">
<button onclick="act('copy')">Kopya</button>
<button onclick="act('paste')">Yapıştır</button>
<button onclick="act('cut')">Kes</button>
</div>

<div class="popup" id="search">
<input id="sTxt" placeholder="Ara">
<button onclick="find()">Bul</button>
<button onclick="closePop()">Kapat</button>
</div>

<div class="popup" id="font">
<button onclick="setFS(fs-1)">-</button>
<span id="fsTxt">16px</span>
<button onclick="setFS(fs+1)">+</button>
<button onclick="closePop()">Kapat</button>
</div>

<div id="preview">
<button onclick="preview.style.display='none'">Kapat</button>
<iframe id="frame" style="flex:1"></iframe>
</div>

<input type="file" id="f" hidden>

<script>
let ed=ed,lines=lines,file=file;
let tabs=[],id=0,cur=null,fs=16,last=0;

/* MIME */
const mime=n=>{
let e=n.split('.').pop();
return {html:'text/html',js:'text/javascript',css:'text/css'}[e]||'text/plain';
}

/* TABS */
function addTab(n="İsimsiz.html",c=""){
id++;tabs.push({id,name:n,content:c,h:[c],i:0});
switchTab(id);
}
function switchTab(i){
if(cur) tabs.find(t=>t.id==cur).content=ed.value;
cur=i;
let t=tabs.find(t=>t.id==i);
ed.value=t.content;file.textContent=t.name;
render();
update();
}
function render(){
tabs.innerHTML='';
tabs.forEach(t=>{
let d=document.createElement('div');
d.className='tab'+(t.id==cur?' active':'');
d.innerHTML=t.name;
d.onclick=()=>switchTab(t.id);
tabs.appendChild(d);
});
}

/* EDIT */
ed.oninput=()=>{
update();
let t=tabs.find(t=>t.id==cur);
t.h.push(ed.value);t.i++;
}

/* LINES */
function update(){
let l=ed.value.split('\n').length;
lines.innerHTML=Array.from({length:l},(_,i)=>i+1).join('<br>');
}

/* INSERT */
function ins(t){
ed.setRangeText(t,ed.selectionStart,ed.selectionEnd,'end');
}

/* SAVE */
function save(as){
let t=tabs.find(t=>t.id==cur);
let n=t.name;
if(as){n=prompt("Ad",n);t.name=n}
let b=new Blob([ed.value],{type:mime(n)});
let a=document.createElement('a');
a.href=URL.createObjectURL(b);
a.download=n;a.click();
}

/* FILE */
function openFile(){f.click()}
f.onchange=e=>{
let r=new FileReader();
r.onload=x=>{
let t=tabs.find(t=>t.id==cur);
t.content=x.target.result;
t.name=e.target.files[0].name;
switchTab(t.id);
}
r.readAsText(e.target.files[0]);
}

/* UNDO REDO */
function undo(){
let t=tabs.find(t=>t.id==cur);
if(t.i>0){t.i--;ed.value=t.h[t.i];update();}
}
function redo(){
let t=tabs.find(t=>t.id==cur);
if(t.i<t.h.length-1){t.i++;ed.value=t.h[t.i];update();}
}

/* SEARCH */
function searchBox(){search.classList.add('active')}
function find(){
let txt=ed.value.toLowerCase();
let w=sTxt.value.toLowerCase();
let i=txt.indexOf(w,last);
if(i!=-1){
ed.setSelectionRange(i,i+w.length);
last=i+w.length;
}else last=0;
}

/* FONT */
function fontBox(){font.classList.add('active')}
function setFS(v){
fs=v;
document.documentElement.style.setProperty('--fs',v+'px');
fsTxt.textContent=v+'px';
localStorage.setItem('fs',v);
}

/* THEME */
function toggleTheme(){
document.body.classList.toggle('dark');
localStorage.setItem('theme',document.body.classList.contains('dark'));
}

/* CLIPBOARD */
async function act(a){
let s=ed.selectionStart,e=ed.selectionEnd;
if(a=='copy') await navigator.clipboard.writeText(ed.value.substring(s,e));
if(a=='cut'){
await navigator.clipboard.writeText(ed.value.substring(s,e));
ed.setRangeText('',s,e);
}
if(a=='paste'){
let t=await navigator.clipboard.readText();
ed.setRangeText(t,s,e);
}
ctx.classList.remove('active');
}

/* CONTEXT */
ed.oncontextmenu=e=>{
e.preventDefault();
ctx.style.left=e.clientX+'px';
ctx.style.top=e.clientY+'px';
ctx.classList.add('active');
}

/* MENU */
menuBtn.onclick=e=>{
e.stopPropagation();
menu.classList.toggle('active');
}
window.onclick=()=>{menu.classList.remove('active');ctx.classList.remove('active')}

/* PREVIEW */
run.onclick=()=>{
preview.style.display='flex';
frame.srcdoc=ed.value;
}

/* INIT */
fs=parseInt(localStorage.getItem('fs'))||16;
setFS(fs);
if(localStorage.getItem('theme')==='false')document.body.classList.remove('dark');

addTab();
</script>
</body>
</html>
