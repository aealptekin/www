<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e1e1e">
    <title>ProCode Editor</title>
    
    <link rel="manifest" id="dynamic-manifest">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    
    <style>
        :root {
            --bg: #1e1e1e;
            --header: #252526;
            --accent: #007acc;
            --border: #3e3e42;
            --text: #d4d4d4;
            --text-muted: #858585;
            --tab-bg: #2d2d2d;
            --tab-active: #1e1e1e;
            --button: #0e639c;
            --editor-font: 'Menlo', 'Monaco', 'Courier New', monospace;
            --font-size: 14px;
        }

        .light {
            --bg: #ffffff;
            --header: #f3f3f3;
            --accent: #0078d4;
            --border: #e0e0e0;
            --text: #333333;
            --text-muted: #808080;
            --tab-bg: #ececec;
            --tab-active: #ffffff;
            --button: #0078d4;
        }

        * {
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            height: 100dvh;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        /* Header */
        #header {
            background: var(--header);
            border-bottom: 1px solid var(--border);
            padding: 8px 12px;
            padding-top: max(8px, env(safe-area-inset-top));
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        #filename {
            flex: 1;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 14px;
            padding: 6px 10px;
            border-radius: 6px;
            outline: none;
        }

        #filename:focus { border-color: var(--accent); }

        .icon-btn {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 6px;
            background: var(--button);
            color: white;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn.secondary { background: transparent; border: 1px solid var(--border); }

        /* Tabs */
        #tabs-container {
            background: var(--tab-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            overflow-x: auto;
            scrollbar-width: none;
            flex-shrink: 0;
        }

        #tabs-container::-webkit-scrollbar { display: none; }

        .tab {
            padding: 10px 14px;
            font-size: 13px;
            background: var(--tab-bg);
            border-right: 1px solid var(--border);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            user-select: none;
            max-width: 160px;
        }

        .tab.active {
            background: var(--tab-active);
            border-bottom: 2px solid var(--accent);
            font-weight: 600;
        }

        .tab-close {
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            font-size: 15px;
        }

        .tab-close:active { background: #ff3b30; color: white; }

        #new-tab-btn {
            padding: 10px 16px;
            background: transparent;
            border: none;
            color: var(--text);
            font-size: 20px;
            cursor: pointer;
        }

        /* Editor Area */
        #editor-wrapper {
            flex: 1;
            display: flex;
            overflow: hidden;
            margin-bottom: calc(44px + env(safe-area-inset-bottom));
        }

        #line-numbers {
            width: 40px;
            background: var(--bg);
            border-right: 1px solid var(--border);
            padding: 10px 4px;
            font-family: var(--editor-font);
            font-size: var(--font-size);
            line-height: 1.5;
            color: var(--text-muted);
            text-align: right;
            overflow: hidden;
            user-select: none;
            flex-shrink: 0;
        }

        textarea {
            flex: 1;
            border: none;
            padding: 10px;
            font-family: var(--editor-font);
            font-size: var(--font-size);
            line-height: 1.5;
            background: var(--bg);
            color: var(--text);
            resize: none;
            outline: none;
            tab-size: 4;
            -webkit-user-select: text;
            user-select: text;
            white-space: pre;
            overflow: auto;
        }

        textarea::selection { background: rgba(0,122,204,0.4); }

        /* Bottom Toolbar */
        #toolbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 44px;
            background: var(--header);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 6px;
            padding: 6px;
            overflow-x: auto;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 100;
        }

        #toolbar::-webkit-scrollbar { display: none; }

        .tool-btn {
            height: 32px;
            padding: 0 12px;
            background: #3c3c3c;
            border: 1px solid #505050;
            color: white;
            border-radius: 6px;
            font-family: monospace;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
        }

        .tool-btn:active { background: var(--accent); }

        /* Floating Nav Buttons */
        #float-nav {
            position: fixed;
            right: 12px;
            bottom: calc(60px + env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 90;
        }

        .nav-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            border: none;
            font-size: 18px;
            cursor: pointer;
            opacity: 0.9;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:active { opacity: 1; transform: scale(0.95); }

        /* Menu */
        #menu-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            z-index: 200;
        }

        #menu-overlay.show { display: block; }

        #menu {
            position: fixed;
            top: calc(env(safe-area-inset-top) + 50px);
            right: 12px;
            background: #2d2d2d;
            border: 1px solid var(--border);
            border-radius: 12px;
            min-width: 220px;
            max-height: 80vh;
            overflow-y: auto;
            display: none;
            flex-direction: column;
            z-index: 201;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #menu.show { display: flex; }

        .menu-item {
            padding: 14px 16px;
            font-size: 15px;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            color: var(--text);
            text-align: left;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .menu-item:last-child { border-bottom: none; }
        .menu-item:active { background: var(--accent); }
        .menu-item.red { color: #ff6b6b; }
        .menu-item.red:active { background: #ff6b6b; color: white; }

        .key-hint { font-size: 12px; color: var(--text-muted); margin-left: 12px; }

        /* Search Modal */
        #search-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            display: none;
            z-index: 300;
        }

        #search-overlay.show { display: block; }

        #search-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #2d2d2d;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            width: 90%;
            max-width: 360px;
            display: none;
            flex-direction: column;
            gap: 12px;
            z-index: 301;
        }

        #search-modal.show { display: flex; }

        .search-input {
            width: 100%;
            padding: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            font-size: 16px;
        }

        .search-row { display: flex; gap: 8px; }

        .search-btn {
            flex: 1;
            padding: 12px;
            background: #3c3c3c;
            border: 1px solid #505050;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }

        .search-btn.primary { background: var(--accent); }

        /* Preview Modal */
        #preview-modal {
            position: fixed;
            inset: 0;
            background: white;
            display: none;
            flex-direction: column;
            z-index: 400;
        }

        #preview-modal.show { display: flex; }

        #preview-header {
            height: 50px;
            background: var(--header);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            padding-top: env(safe-area-inset-top);
        }

        #preview-frame {
            flex: 1;
            border: none;
            background: white;
        }

        input[type="file"] { display: none; }
    </style>
</head>
<body class="dark">
    <div id="app">
        <div id="header">
            <input type="text" id="filename" value="new.txt">
            <button class="icon-btn secondary" id="menu-btn">☰</button>
            <button class="icon-btn" id="preview-btn">▶</button>
        </div>

        <div id="tabs-container">
            <button id="new-tab-btn">+</button>
        </div>

        <div id="editor-wrapper">
            <div id="line-numbers">1</div>
            <textarea id="editor" spellcheck="false" autocapitalize="off"></textarea>
        </div>
    </div>

    <!-- Toolbar -->
    <div id="toolbar">
        <button class="tool-btn" data-char="\t">Tab</button>
        <button class="tool-btn" data-char="<">&lt;</button>
        <button class="tool-btn" data-char=">">&gt;</button>
        <button class="tool-btn" data-char="/">/</button>
        <button class="tool-btn" data-char="{">{</button>
        <button class="tool-btn" data-char="}">}</button>
        <button class="tool-btn" data-char="(">(</button>
        <button class="tool-btn" data-char=")">)</button>
        <button class="tool-btn" data-char=";">;</button>
        <button class="tool-btn" data-char="=">=</button>
        <button class="tool-btn" data-char='"'>"</button>
        <button class="tool-btn" data-char="'">'</button>
    </div>

    <!-- Floating Nav -->
    <div id="float-nav">
        <button class="nav-btn" data-nav="top">⤒</button>
        <button class="nav-btn" data-nav="up">↑</button>
        <button class="nav-btn" data-nav="down">↓</button>
        <button class="nav-btn" data-nav="bottom">⤓</button>
    </div>

    <!-- Menu -->
    <div id="menu-overlay"></div>
    <div id="menu">
        <button class="menu-item" data-action="open">Aç...<span class="key-hint">Ctrl+O</span></button>
        <button class="menu-item" data-action="openZip">ZIP Aç...</button>
        <button class="menu-item" data-action="save">Kaydet<span class="key-hint">Ctrl+S</span></button>
        <button class="menu-item" data-action="saveZip">ZIP Kaydet</button>
        <button class="menu-item" data-action="undo">Geri Al<span class="key-hint">Ctrl+Z</span></button>
        <button class="menu-item" data-action="redo">İleri Al<span class="key-hint">Ctrl+Y</span></button>
        <button class="menu-item" data-action="search">Bul/Değiştir<span class="key-hint">Ctrl+F</span></button>
        <button class="menu-item" data-action="fontSize">Yazı Boyutu</button>
        <button class="menu-item" data-action="theme">Tema Değiştir</button>
        <button class="menu-item" data-action="selectAll">Tümünü Seç</button>
        <button class="menu-item" data-action="copy">Kopyala</button>
        <button class="menu-item" data-action="cut">Kes</button>
        <button class="menu-item" data-action="paste">Yapıştır</button>
        <button class="menu-item red" data-action="clear">Tümünü Sil</button>
    </div>

    <!-- Search -->
    <div id="search-overlay"></div>
    <div id="search-modal">
        <input type="text" class="search-input" id="find-text" placeholder="Ara...">
        <input type="text" class="search-input" id="replace-text" placeholder="Değiştir...">
        <div class="search-row">
            <button class="search-btn" id="close-search">Kapat</button>
            <button class="search-btn" id="find-prev">Önceki</button>
            <button class="search-btn primary" id="find-next">Sonraki</button>
        </div>
        <div class="search-row">
            <button class="search-btn" id="replace-one">Değiştir</button>
            <button class="search-btn primary" id="replace-all">Tümünü Değiştir</button>
        </div>
    </div>

    <!-- Preview -->
    <div id="preview-modal">
        <div id="preview-header">
            <b>Önizleme</b>
            <button class="icon-btn" id="close-preview">Kapat</button>
        </div>
        <iframe id="preview-frame"></iframe>
    </div>

    <input type="file" id="file-input" accept=".txt,.html,.js,.css,.json,.md,.py,.php,.zip">
    <input type="file" id="zip-input" accept=".zip">

    <script>
        // Service Worker Registration
        const swCode = `
            const CACHE_NAME = 'procode-v1';
            const urlsToCache = ['./', './index.html'];
            self.addEventListener('install', e => {
                e.waitUntil(caches.open(CACHE_NAME).then(cache => cache.addAll(urlsToCache)));
                self.skipWaiting();
            });
            self.addEventListener('fetch', e => {
                e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
            });
        `;
        
        if('serviceWorker' in navigator) {
            const blob = new Blob([swCode], {type: 'application/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(blob));
        }

        // App State
        const App = {
            tabs: [],
            activeTab: null,
            counter: 0,
            history: new Map(),
            zipFile: null,
            fontSizes: [12, 14, 16, 18, 20],
            currentFontIndex: 1,

            init() {
                this.cacheDOM();
                this.bindEvents();
                this.newTab();
            },

            cacheDOM() {
                this.dom = {
                    editor: document.getElementById('editor'),
                    filename: document.getElementById('filename'),
                    tabsContainer: document.getElementById('tabs-container'),
                    newTabBtn: document.getElementById('new-tab-btn'),
                    lineNumbers: document.getElementById('line-numbers'),
                    menu: document.getElementById('menu'),
                    menuOverlay: document.getElementById('menu-overlay'),
                    searchModal: document.getElementById('search-modal'),
                    searchOverlay: document.getElementById('search-overlay'),
                    previewModal: document.getElementById('preview-modal'),
                    previewFrame: document.getElementById('preview-frame'),
                    findText: document.getElementById('find-text'),
                    replaceText: document.getElementById('replace-text'),
                    fileInput: document.getElementById('file-input'),
                    zipInput: document.getElementById('zip-input')
                };
            },

            bindEvents() {
                // Tab events
                this.dom.newTabBtn.addEventListener('click', () => this.newTab());
                
                this.dom.filename.addEventListener('change', (e) => {
                    const tab = this.getActiveTab();
                    if(tab) {
                        tab.name = e.target.value;
                        this.renderTabs();
                    }
                });

                // Editor events
                this.dom.editor.addEventListener('input', () => this.onEditorInput());
                this.dom.editor.addEventListener('scroll', () => {
                    this.dom.lineNumbers.scrollTop = this.dom.editor.scrollTop;
                });

                // Toolbar
                document.querySelectorAll('.tool-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const char = btn.dataset.char === '\\t' ? '\t' : btn.dataset.char;
                        this.insertText(char);
                    });
                });

                // Floating nav
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.preventDefault();
                        this.scrollTo(btn.dataset.nav);
                    });
                });

                // Menu
                document.getElementById('menu-btn').addEventListener('click', () => this.toggleMenu());
                this.dom.menuOverlay.addEventListener('click', () => this.toggleMenu());
                
                this.dom.menu.addEventListener('click', (e) => {
                    const item = e.target.closest('.menu-item');
                    if(item) this.handleMenu(item.dataset.action);
                });

                // Search
                document.getElementById('preview-btn').addEventListener('click', () => this.togglePreview());
                document.getElementById('close-preview').addEventListener('click', () => this.togglePreview());
                
                document.getElementById('close-search').addEventListener('click', () => this.closeSearch());
                document.getElementById('find-next').addEventListener('click', () => this.findNext());
                document.getElementById('find-prev').addEventListener('click', () => this.findPrev());
                document.getElementById('replace-one').addEventListener('click', () => this.replaceOne());
                document.getElementById('replace-all').addEventListener('click', () => this.replaceAll());

                // File inputs
                this.dom.fileInput.addEventListener('change', (e) => this.handleFile(e.target.files[0]));
                this.dom.zipInput.addEventListener('change', (e) => this.handleZip(e.target.files[0]));

                // Keyboard shortcuts
                document.addEventListener('keydown', (e) => {
                    if(e.key === 'Tab') {
                        e.preventDefault();
                        this.insertText('    ');
                    }
                    if(e.ctrlKey || e.metaKey) {
                        if(e.key === 's') { e.preventDefault(); this.saveFile(); }
                        if(e.key === 'o') { e.preventDefault(); this.openFile(); }
                        if(e.key === 'f') { e.preventDefault(); this.openSearch(); }
                        if(e.key === 'z') { e.preventDefault(); this.undo(); }
                        if(e.key === 'y') { e.preventDefault(); this.redo(); }
                    }
                });
            },

            newTab(name = 'new.txt', content = '') {
                this.counter++;
                const id = this.counter;
                this.tabs.push({id, name, content, modified: false});
                this.history.set(id, {stack: [content], index: 0});
                this.switchTab(id);
            },

            switchTab(id) {
                const current = this.getActiveTab();
                if(current) current.content = this.dom.editor.value;
                
                this.activeTab = id;
                const tab = this.tabs.find(t => t.id === id);
                this.dom.editor.value = tab.content;
                this.dom.filename.value = tab.name;
                this.updateLineNumbers();
                this.renderTabs();
            },

            closeTab(id) {
                if(this.tabs.length <= 1) return;
                this.tabs = this.tabs.filter(t => t.id !== id);
                this.history.delete(id);
                if(this.activeTab === id) {
                    this.switchTab(this.tabs[this.tabs.length - 1].id);
                } else {
                    this.renderTabs();
                }
            },

            renderTabs() {
                // Clear existing tabs except new tab button
                const existing = this.dom.tabsContainer.querySelectorAll('.tab');
                existing.forEach(t => t.remove());

                // Render tabs
                this.tabs.forEach(tab => {
                    const div = document.createElement('div');
                    div.className = 'tab' + (tab.id === this.activeTab ? ' active' : '');
                    div.innerHTML = `<span>${tab.name}${tab.modified ? ' •' : ''}</span><span class="tab-close" data-id="${tab.id}">×</span>`;
                    
                    div.addEventListener('click', (e) => {
                        if(e.target.classList.contains('tab-close')) {
                            e.stopPropagation();
                            this.closeTab(tab.id);
                        } else {
                            this.switchTab(tab.id);
                        }
                    });
                    
                    this.dom.tabsContainer.insertBefore(div, this.dom.newTabBtn);
                });
            },

            getActiveTab() {
                return this.tabs.find(t => t.id === this.activeTab);
            },

            onEditorInput() {
                this.updateLineNumbers();
                const tab = this.getActiveTab();
                if(tab) {
                    tab.content = this.dom.editor.value;
                    if(!tab.modified) {
                        tab.modified = true;
                        this.renderTabs();
                    }
                }
                clearTimeout(this.historyTimer);
                this.historyTimer = setTimeout(() => this.saveHistory(), 500);
            },

            updateLineNumbers() {
                const lines = this.dom.editor.value.split('\n').length;
                this.dom.lineNumbers.innerHTML = Array(lines).fill(0).map((_,i) => i+1).join('<br>');
            },

            insertText(text) {
                const ed = this.dom.editor;
                const start = ed.selectionStart;
                const end = ed.selectionEnd;
                ed.setRangeText(text, start, end, 'end');
                ed.focus();
                ed.dispatchEvent(new Event('input'));
            },

            scrollTo(direction) {
                const ed = this.dom.editor;
                const lineHeight = 21;
                
                switch(direction) {
                    case 'top':
                        ed.scrollTop = 0;
                        ed.setSelectionRange(0, 0);
                        break;
                    case 'bottom':
                        ed.scrollTop = ed.scrollHeight;
                        const len = ed.value.length;
                        ed.setSelectionRange(len, len);
                        break;
                    case 'up':
                        ed.scrollBy({top: -200, behavior: 'smooth'});
                        break;
                    case 'down':
                        ed.scrollBy({top: 200, behavior: 'smooth'});
                        break;
                }
            },

            saveHistory() {
                const tab = this.getActiveTab();
                if(!tab) return;
                const h = this.history.get(tab.id);
                if(h.stack[h.index] === this.dom.editor.value) return;
                
                if(h.index < h.stack.length - 1) h.stack = h.stack.slice(0, h.index + 1);
                h.stack.push(this.dom.editor.value);
                h.index++;
                if(h.stack.length > 50) { h.stack.shift(); h.index--; }
            },

            undo() {
                const tab = this.getActiveTab();
                if(!tab) return;
                const h = this.history.get(tab.id);
                if(h.index > 0) {
                    h.index--;
                    this.dom.editor.value = h.stack[h.index];
                    tab.content = h.stack[h.index];
                    this.updateLineNumbers();
                }
            },

            redo() {
                const tab = this.getActiveTab();
                if(!tab) return;
                const h = this.history.get(tab.id);
                if(h.index < h.stack.length - 1) {
                    h.index++;
                    this.dom.editor.value = h.stack[h.index];
                    tab.content = h.stack[h.index];
                    this.updateLineNumbers();
                }
            },

            toggleMenu() {
                const show = !this.dom.menu.classList.contains('show');
                this.dom.menu.classList.toggle('show', show);
                this.dom.menuOverlay.classList.toggle('show', show);
            },

            handleMenu(action) {
                this.toggleMenu();
                switch(action) {
                    case 'open': this.dom.fileInput.click(); break;
                    case 'openZip': this.dom.zipInput.click(); break;
                    case 'save': this.saveFile(); break;
                    case 'saveZip': this.saveAsZip(); break;
                    case 'undo': this.undo(); break;
                    case 'redo': this.redo(); break;
                    case 'search': this.openSearch(); break;
                    case 'fontSize': this.changeFont(); break;
                    case 'theme': this.toggleTheme(); break;
                    case 'selectAll': this.dom.editor.select(); this.dom.editor.focus(); break;
                    case 'copy': this.copy(); break;
                    case 'cut': this.cut(); break;
                    case 'paste': this.paste(); break;
                    case 'clear': 
                        if(confirm('Tüm içerik silinsin mi?')) {
                            this.dom.editor.value = '';
                            this.dom.editor.dispatchEvent(new Event('input'));
                        }
                        break;
                }
            },

            handleFile(file) {
                if(!file) return;
                const reader = new FileReader();
                reader.onload = (e) => this.newTab(file.name, e.target.result);
                reader.readAsText(file);
                this.dom.fileInput.value = '';
            },

            async handleZip(file) {
                if(!file) return;
                try {
                    const zip = await JSZip.loadAsync(file);
                    this.zipFile = zip;
                    const files = Object.keys(zip.files).filter(f => !zip.files[f].dir);
                    if(files.length > 0) {
                        const content = await zip.files[files[0]].async('string');
                        this.newTab(files[0], content);
                    }
                } catch(e) { alert('ZIP hatası'); }
                this.dom.zipInput.value = '';
            },

            saveFile() {
                const tab = this.getActiveTab();
                if(!tab) return;
                const blob = new Blob([this.dom.editor.value], {type: 'text/plain'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = tab.name;
                a.click();
                URL.revokeObjectURL(url);
                tab.modified = false;
                this.renderTabs();
            },

            async saveAsZip() {
                const tab = this.getActiveTab();
                if(!tab) return;
                const zip = new JSZip();
                zip.file(tab.name, this.dom.editor.value);
                const blob = await zip.generateAsync({type: 'blob'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = tab.name + '.zip';
                a.click();
                URL.revokeObjectURL(url);
            },

            openSearch() {
                this.dom.searchModal.classList.add('show');
                this.dom.searchOverlay.classList.add('show');
                this.dom.findText.focus();
            },

            closeSearch() {
                this.dom.searchModal.classList.remove('show');
                this.dom.searchOverlay.classList.remove('show');
            },

            findNext() {
                const text = this.dom.findText.value;
                if(!text) return;
                const content = this.dom.editor.value;
                let idx = content.indexOf(text, this.dom.editor.selectionEnd);
                if(idx === -1) idx = content.indexOf(text);
                if(idx === -1) return;
                this.dom.editor.setSelectionRange(idx, idx + text.length);
                this.dom.editor.focus();
            },

            findPrev() {
                const text = this.dom.findText.value;
                if(!text) return;
                const content = this.dom.editor.value;
                let idx = content.lastIndexOf(text, this.dom.editor.selectionStart - 1);
                if(idx === -1) idx = content.lastIndexOf(text);
                if(idx === -1) return;
                this.dom.editor.setSelectionRange(idx, idx + text.length);
                this.dom.editor.focus();
            },

            replaceOne() {
                const find = this.dom.findText.value;
                const replace = this.dom.replaceText.value;
                const sel = this.dom.editor.value.substring(this.dom.editor.selectionStart, this.dom.editor.selectionEnd);
                if(sel === find) this.insertText(replace);
                this.findNext();
            },

            replaceAll() {
                const find = this.dom.findText.value;
                const replace = this.dom.replaceText.value;
                this.dom.editor.value = this.dom.editor.value.split(find).join(replace);
                this.dom.editor.dispatchEvent(new Event('input'));
            },

            togglePreview() {
                if(!this.dom.previewModal.classList.contains('show')) {
                    const name = this.dom.filename.value;
                    const content = this.dom.editor.value;
                    if(name.match(/\.html?$/i)) {
                        this.dom.previewFrame.srcdoc = content;
                    } else {
                        this.dom.previewFrame.srcdoc = `<pre style="padding:20px;font-family:monospace">${content.replace(/</g,'&lt;')}</pre>`;
                    }
                    this.dom.previewModal.classList.add('show');
                } else {
                    this.dom.previewModal.classList.remove('show');
                }
            },

            changeFont() {
                this.currentFontIndex = (this.currentFontIndex + 1) % this.fontSizes.length;
                const size = this.fontSizes[this.currentFontIndex];
                document.documentElement.style.setProperty('--font-size', size + 'px');
            },

            toggleTheme() {
                document.body.classList.toggle('light');
            },

            async copy() {
                const text = this.dom.editor.value.substring(this.dom.editor.selectionStart, this.dom.editor.selectionEnd);
                if(text) await navigator.clipboard.writeText(text);
            },

            async cut() {
                const ed = this.dom.editor;
                const text = ed.value.substring(ed.selectionStart, ed.selectionEnd);
                if(text) {
                    await navigator.clipboard.writeText(text);
                    ed.setRangeText('', ed.selectionStart, ed.selectionEnd, 'end');
                    ed.dispatchEvent(new Event('input'));
                }
            },

            async paste() {
                const text = await navigator.clipboard.readText();
                this.insertText(text);
            }
        };
                // Initialize PWA Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
        App.init();
    </script>
</body>
