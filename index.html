<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e1e1e">
    <title>ProCode Editor</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --bg: #1e1e1e;
            --header: #252526;
            --accent: #007acc;
            --border: #3e3e42;
            --text: #d4d4d4;
            --text-muted: #858585;
            --tab-bg: #2d2d2d;
            --tab-active: #1e1e1e;
            --button: #0e639c;
            --font-size: 14px;
        }

        .light {
            --bg: #ffffff;
            --header: #f3f3f3;
            --accent: #0078d4;
            --border: #e0e0e0;
            --text: #333;
            --tab-bg: #ececec;
            --tab-active: #ffffff;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; height: 100dvh; overflow: hidden; font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); }
        
        #app { display: flex; flex-direction: column; height: 100%; }
        
        #header {
            background: var(--header);
            border-bottom: 1px solid var(--border);
            padding: 8px 12px;
            padding-top: max(8px, env(safe-area-inset-top));
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        #filename { flex: 1; background: transparent; border: 1px solid var(--border); color: var(--text); font-size: 14px; padding: 6px 10px; border-radius: 6px; }
        #filename:focus { border-color: var(--accent); outline: none; }
        
        .icon-btn {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 6px;
            background: var(--button);
            color: white;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .icon-btn.secondary { background: transparent; border: 1px solid var(--border); }

        #tabs-container {
            background: var(--tab-bg);
            border-bottom: 1px solid var(--border);
            display: flex;
            overflow-x: auto;
            scrollbar-width: none;
            flex-shrink: 0;
        }
        #tabs-container::-webkit-scrollbar { display: none; }

        .tab {
            padding: 10px 14px;
            font-size: 13px;
            background: var(--tab-bg);
            border-right: 1px solid var(--border);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            user-select: none;
        }
        .tab.active { background: var(--tab-active); border-bottom: 2px solid var(--accent); font-weight: 600; }
        .tab-close { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-size: 15px; }
        .tab-close:active { background: #ff3b30; color: white; }
        
        #new-tab-btn { padding: 10px 16px; background: transparent; border: none; color: var(--text); font-size: 20px; cursor: pointer; }

        #editor-wrapper {
            flex: 1;
            display: flex;
            overflow: hidden;
            margin-bottom: calc(44px + env(safe-area-inset-bottom));
        }

        #line-numbers {
            width: 40px;
            background: var(--bg);
            border-right: 1px solid var(--border);
            padding: 10px 4px;
            font-family: monospace;
            font-size: var(--font-size);
            line-height: 1.5;
            color: var(--text-muted);
            text-align: right;
            overflow: hidden;
            user-select: none;
            flex-shrink: 0;
        }

        textarea {
            flex: 1;
            border: none;
            padding: 10px;
            font-family: monospace;
            font-size: var(--font-size);
            line-height: 1.5;
            background: var(--bg);
            color: var(--text);
            resize: none;
            outline: none;
            tab-size: 4;
            -webkit-user-select: text;
            user-select: text;
            white-space: pre;
            overflow: auto;
        }
        textarea::selection { background: rgba(0,122,204,0.4); }

        #toolbar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 44px;
            background: var(--header);
            border-top: 1px solid var(--border);
            display: flex;
            gap: 6px;
            padding: 6px;
            overflow-x: auto;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 100;
        }
        #toolbar::-webkit-scrollbar { display: none; }

        .tool-btn {
            height: 32px;
            padding: 0 12px;
            background: #3c3c3c;
            border: 1px solid #505050;
            color: white;
            border-radius: 6px;
            font-family: monospace;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
        }
        .tool-btn:active { background: var(--accent); }

        #float-nav {
            position: fixed;
            right: 12px;
            bottom: calc(60px + env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 90;
        }
        .nav-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            border: none;
            font-size: 18px;
            cursor: pointer;
            opacity: 0.9;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-btn:active { opacity: 1; transform: scale(0.95); }

        /* Menu */
        #menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; z-index: 200; }
        #menu-overlay.show { display: block; }
        
        #menu {
            position: fixed;
            top: calc(env(safe-area-inset-top) + 50px);
            right: 12px;
            background: #2d2d2d;
            border: 1px solid var(--border);
            border-radius: 12px;
            min-width: 220px;
            max-height: 80vh;
            overflow-y: auto;
            display: none;
            flex-direction: column;
            z-index: 201;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        #menu.show { display: flex; }
        
        .menu-item {
            padding: 14px 16px;
            font-size: 15px;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            color: var(--text);
            text-align: left;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            width: 100%;
        }
        .menu-item:last-child { border-bottom: none; }
        .menu-item:active { background: var(--accent); }
        .menu-item.red { color: #ff6b6b; }
        .menu-item.red:active { background: #ff6b6b; color: white; }
        .key-hint { font-size: 12px; color: var(--text-muted); margin-left: auto; padding-left: 20px; }

        /* Search - KOMPAKT ve ORTADA */
        #search-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; z-index: 300; }
        #search-overlay.show { display: block; }
        
        #search-box {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #2d2d2d;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            width: 85%;
            max-width: 320px;
            display: none;
            flex-direction: column;
            gap: 10px;
            z-index: 301;
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }
        #search-box.show { display: flex; }
        
        .search-input {
            width: 100%;
            padding: 10px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            font-size: 15px;
        }
        .search-row { display: flex; gap: 8px; margin-top: 4px; }
        .search-btn {
            flex: 1;
            padding: 10px 8px;
            background: #3c3c3c;
            border: 1px solid #505050;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }
        .search-btn.primary { background: var(--accent); }

        /* Preview */
        #preview-modal { position: fixed; inset: 0; background: white; display: none; flex-direction: column; z-index: 400; }
        #preview-modal.show { display: flex; }
        #preview-header { height: 50px; background: var(--header); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; padding-top: env(safe-area-inset-top); }
        #preview-frame { flex: 1; border: none; background: white; }

        input[type="file"] { display: none; }
    </style>
</head>
<body>
    <div id="app">
        <div id="header">
            <input type="text" id="filename" value="new.txt">
            <button class="icon-btn secondary" id="menu-btn">☰</button>
            <button class="icon-btn" id="preview-btn">▶</button>
        </div>

        <div id="tabs-container">
            <button id="new-tab-btn">+</button>
        </div>

        <div id="editor-wrapper">
            <div id="line-numbers">1</div>
            <textarea id="editor" spellcheck="false" autocapitalize="off"></textarea>
        </div>
    </div>

    <div id="toolbar">
        <button class="tool-btn" data-char="\t">Tab</button>
        <button class="tool-btn" data-char="<">&lt;</button>
        <button class="tool-btn" data-char=">">&gt;</button>
        <button class="tool-btn" data-char="/">/</button>
        <button class="tool-btn" data-char="{">{</button>
        <button class="tool-btn" data-char="}">}</button>
        <button class="tool-btn" data-char="(">(</button>
        <button class="tool-btn" data-char=")">)</button>
        <button class="tool-btn" data-char=";">;</button>
        <button class="tool-btn" data-char="=">=</button>
        <button class="tool-btn" data-char='"'>"</button>
        <button class="tool-btn" data-char="'">'</button>
    </div>

    <div id="float-nav">
        <button class="nav-btn" data-nav="top">⤒</button>
        <button class="nav-btn" data-nav="up">↑</button>
        <button class="nav-btn" data-nav="down">↓</button>
        <button class="nav-btn" data-nav="bottom">⤓</button>
    </div>

    <div id="menu-overlay"></div>
    <div id="menu">
        <button class="menu-item" data-action="open">Aç...<span class="key-hint">Ctrl+O</span></button>
        <button class="menu-item" data-action="openZip">ZIP Aç...</button>
        <button class="menu-item" data-action="save">Kaydet<span class="key-hint">Ctrl+S</span></button>
        <button class="menu-item" data-action="saveZip">ZIP Kaydet</button>
        <button class="menu-item" data-action="undo">Geri Al<span class="key-hint">Ctrl+Z</span></button>
        <button class="menu-item" data-action="redo">İleri Al<span class="key-hint">Ctrl+Y</span></button>
        <button class="menu-item" data-action="search">Bul/Değiştir<span class="key-hint">Ctrl+F</span></button>
        <button class="menu-item" data-action="fontSize">Yazı Boyutu</button>
        <button class="menu-item" data-action="theme">Tema Değiştir</button>
        <button class="menu-item" data-action="selectAll">Tümünü Seç</button>
        <button class="menu-item" data-action="copy">Kopyala</button>
        <button class="menu-item" data-action="cut">Kes</button>
        <button class="menu-item" data-action="paste">Yapıştır</button>
        <button class="menu-item red" data-action="clear">Tümünü Sil</button>
    </div>

    <div id="search-overlay"></div>
    <div id="search-box">
        <input type="text" class="search-input" id="find-text" placeholder="Ara...">
        <input type="text" class="search-input" id="replace-text" placeholder="Değiştir...">
        <div class="search-row">
            <button class="search-btn" id="close-search">Kapat</button>
            <button class="search-btn" id="find-prev">← Önceki</button>
            <button class="search-btn primary" id="find-next">Sonraki →</button>
        </div>
        <div class="search-row">
            <button class="search-btn" id="replace-one">Değiştir</button>
            <button class="search-btn primary" id="replace-all">Tümünü Değiştir</button>
        </div>
    </div>

    <div id="preview-modal">
        <div id="preview-header">
            <b>Önizleme</b>
            <button class="icon-btn" id="close-preview">Kapat</button>
        </div>
        <iframe id="preview-frame"></iframe>
    </div>

    <input type="file" id="file-input" accept=".txt,.html,.js,.css,.json,.md,.py,.php,.zip">
    <input type="file" id="zip-input" accept=".zip">

    <script>
        // Service Worker Kaydı (Dosya olarak)
        if('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('SW registered'))
                .catch(err => console.log('SW error:', err));
        }

        const App = {
            tabs: [],
            activeTab: null,
            counter: 0,
            history: new Map(),
            zipFile: null,
            fontSizes: [12, 14, 16, 18, 20],
            fontIndex: 1,

            init() {
                this.cacheElements();
                this.bindEvents();
                this.newTab();
            },

            cacheElements() {
                this.el = {
                    editor: document.getElementById('editor'),
                    filename: document.getElementById('filename'),
                    tabsContainer: document.getElementById('tabs-container'),
                    lineNumbers: document.getElementById('line-numbers'),
                    menu: document.getElementById('menu'),
                    menuOverlay: document.getElementById('menu-overlay'),
                    searchBox: document.getElementById('search-box'),
                    searchOverlay: document.getElementById('search-overlay'),
                    previewModal: document.getElementById('preview-modal'),
                    previewFrame: document.getElementById('preview-frame'),
                    findText: document.getElementById('find-text'),
                    replaceText: document.getElementById('replace-text'),
                    fileInput: document.getElementById('file-input'),
                    zipInput: document.getElementById('zip-input')
                };
            },

            bindEvents() {
                document.getElementById('new-tab-btn').addEventListener('click', () => this.newTab());
                document.getElementById('menu-btn').addEventListener('click', () => this.toggleMenu());
                document.getElementById('preview-btn').addEventListener('click', () => this.togglePreview());
                document.getElementById('close-preview').addEventListener('click', () => this.togglePreview());
                this.el.menuOverlay.addEventListener('click', () => this.toggleMenu());
                
                this.el.filename.addEventListener('change', (e) => {
                    const tab = this.getActiveTab();
                    if(tab) { tab.name = e.target.value; this.renderTabs(); }
                });

                this.el.editor.addEventListener('input', () => {
                    this.updateLineNumbers();
                    const tab = this.getActiveTab();
                    if(tab) {
                        tab.content = this.el.editor.value;
                        if(!tab.modified) { tab.modified = true; this.renderTabs(); }
                    }
                    clearTimeout(this.historyTimer);
                    this.historyTimer = setTimeout(() => this.saveHistory(), 400);
                });

                this.el.editor.addEventListener('scroll', () => {
                    this.el.lineNumbers.scrollTop = this.el.editor.scrollTop;
                });

                document.querySelectorAll('.tool-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        const char = btn.dataset.char === '\\t' ? '\t' : btn.dataset.char;
                        this.insertText(char);
                    });
                });

                document.querySelectorAll('.nav-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.preventDefault();
                        this.navigate(btn.dataset.nav);
                    });
                });

                this.el.menu.addEventListener('click', (e) => {
                    const item = e.target.closest('.menu-item');
                    if(item) this.handleAction(item.dataset.action);
                });

                document.getElementById('close-search').addEventListener('click', () => this.closeSearch());
                document.getElementById('find-next').addEventListener('click', () => this.findNext());
                document.getElementById('find-prev').addEventListener('click', () => this.findPrev());
                document.getElementById('replace-one').addEventListener('click', () => this.replaceOne());
                document.getElementById('replace-all').addEventListener('click', () => this.replaceAll());

                this.el.fileInput.addEventListener('change', (e) => this.handleFile(e.target.files[0]));
                this.el.zipInput.addEventListener('change', (e) => this.handleZip(e.target.files[0]));

                document.addEventListener('keydown', (e) => {
                    if(e.key === 'Tab') { e.preventDefault(); this.insertText('    '); }
                    if(e.ctrlKey || e.metaKey) {
                        if(e.key === 's') { e.preventDefault(); this.saveFile(); }
                        if(e.key === 'o') { e.preventDefault(); this.el.fileInput.click(); }
                        if(e.key === 'f') { e.preventDefault(); this.openSearch(); }
                        if(e.key === 'z') { e.preventDefault(); this.undo(); }
                        if(e.key === 'y') { e.preventDefault(); this.redo(); }
                    }
                });
            },

            newTab(name='new.txt', content='') {
                this.counter++;
                const id = this.counter;
                this.tabs.push({id, name, content, modified: false});
                this.history.set(id, {stack: [content], index: 0});
                this.switchTab(id);
            },

            switchTab(id) {
                const current = this.getActiveTab();
                if(current) current.content = this.el.editor.value;
                this.activeTab = id;
                const tab = this.tabs.find(t => t.id === id);
                this.el.editor.value = tab.content;
                this.el.filename.value = tab.name;
                this.updateLineNumbers();
                this.renderTabs();
            },

            closeTab(id) {
                if(this.tabs.length <= 1) return;
                this.tabs = this.tabs.filter(t => t.id !== id);
                this.history.delete(id);
                if(this.activeTab === id) this.switchTab(this.tabs[this.tabs.length-1].id);
                else this.renderTabs();
            },

            renderTabs() {
                const existing = this.el.tabsContainer.querySelectorAll('.tab');
                existing.forEach(t => t.remove());
                
                this.tabs.forEach(tab => {
                    const div = document.createElement('div');
                    div.className = 'tab' + (tab.id === this.activeTab ? ' active' : '');
                    div.innerHTML = `<span>${tab.name}${tab.modified ? ' •' : ''}</span><span class="tab-close" data-id="${tab.id}">×</span>`;
                    div.addEventListener('click', (e) => {
                        if(e.target.classList.contains('tab-close')) {
                            e.stopPropagation();
                            this.closeTab(tab.id);
                        } else {
                            this.switchTab(tab.id);
                        }
                    });
                    this.el.tabsContainer.insertBefore(div, document.getElementById('new-tab-btn'));
                });
            },

            getActiveTab() { return this.tabs.find(t => t.id === this.activeTab); },

            updateLineNumbers() {
                const lines = this.el.editor.value.split('\n').length;
                this.el.lineNumbers.innerHTML = Array(lines).fill(0).map((_,i) => i+1).join('<br>');
            },

            insertText(text) {
                const ed = this.el.editor;
                ed.setRangeText(text, ed.selectionStart, ed.selectionEnd, 'end');
                ed.focus();
                ed.dispatchEvent(new Event('input'));
            },

            navigate(dir) {
                const ed = this.el.editor;
                switch(dir) {
                    case 'top': ed.scrollTop = 0; ed.setSelectionRange(0,0); break;
                    case 'bottom': ed.scrollTop = ed.scrollHeight; const len=ed.value.length; ed.setSelectionRange(len,len); break;
                    case 'up': ed.scrollBy({top: -200, behavior: 'smooth'}); break;
                    case 'down': ed.scrollBy({top: 200, behavior: 'smooth'}); break;
                }
            },

            saveHistory() {
                const tab = this.getActiveTab();
                if(!tab) return;
                const h = this.history.get(tab.id);
                if(h.stack[h.index] === this.el.editor.value) return;
                if(h.index < h.stack.length-1) h.stack = h.stack.slice(0, h.index+1);
                h.stack.push(this.el.editor.value);
                h.index++;
                if(h.stack.length > 50) { h.stack.shift(); h.index--; }
            },

            undo() {
                const tab = this.getActiveTab();
                if(!tab) return;
                const h = this.history.get(tab.id);
                if(h.index > 0) {
                    h.index--;
                    this.el.editor.value = h.stack[h.index];
                    tab.content = h.stack[h.index];
                    this.updateLineNumbers();
                }
            },

            redo() {
                const tab = this.getActiveTab();
                if(!tab) return;
                const h = this.history.get(tab.id);
                if(h.index < h.stack.length-1) {
                    h.index++;
                    this.el.editor.value = h.stack[h.index];
                    tab.content = h.stack[h.index];
                    this.updateLineNumbers();
                }
            },

            toggleMenu() {
                const show = !this.el.menu.classList.contains('show');
                this.el.menu.classList.toggle('show', show);
                this.el.menuOverlay.classList.toggle('show', show);
            },

            handleAction(action) {
                this.toggleMenu();
                switch(action) {
                    case 'open': this.el.fileInput.click(); break;
                    case 'openZip': this.el.zipInput.click(); break;
                    case 'save': this.saveFile(); break;
                    case 'saveZip': this.saveZip(); break;
                    case 'undo': this.undo(); break;
                    case 'redo': this.redo(); break;
                    case 'search': this.openSearch(); break;
                    case 'fontSize': this.changeFont(); break;
                    case 'theme': this.toggleTheme(); break;
                    case 'selectAll': this.el.editor.select(); this.el.editor.focus(); break;
                    case 'copy': this.copy(); break;
                    case 'cut': this.cut(); break;
                    case 'paste': this.paste(); break;
                    case 'clear': if(confirm('Tüm içerik silinsin mi?')) { this.el.editor.value=''; this.el.editor.dispatchEvent(new Event('input')); } break;
                }
            },

            handleFile(file) {
                if(!file) return;
                const reader = new FileReader();
                reader.onload = (e) => this.newTab(file.name, e.target.result);
                reader.readAsText(file);
                this.el.fileInput.value = '';
            },

            async handleZip(file) {
                if(!file) return;
                try {
                    const zip = await JSZip.loadAsync(file);
                    this.zipFile = zip;
                    const files = Object.keys(zip.files).filter(f => !zip.files[f].dir);
                    if(files.length > 0) {
                        const content = await zip.files[files[0]].async('string');
                        this.newTab(files[0], content);
                    }
                } catch(e) { alert('ZIP hatası'); }
                this.el.zipInput.value = '';
            },

            saveFile() {
                const tab = this.getActiveTab();
                if(!tab) return;
                
                const fileName = tab.name;
                const extension = fileName.split('.').pop().toLowerCase();
                
                // Dosya uzantılarına göre MIME type haritası
                const mimeTypes = {
                    // Metin ve Belge Dosyaları
                    'txt': 'text/plain',
                    'log': 'text/plain',
                    'md': 'text/markdown',
                    
                    // Web Dilleri
                    'html': 'text/html',
                    'htm': 'text/html',
                    'css': 'text/css',
                    'js': 'text/javascript',
                    'mjs': 'text/javascript',
                    'xml': 'application/xml',
                    'json': 'application/json',
                    
                    // C-Ailesi
                    'c': 'text/plain',
                    'cpp': 'text/plain',
                    'h': 'text/plain',
                    'cs': 'text/plain',
                    
                    // Scripting Dilleri
                    'py': 'text/x-python',
                    'php': 'text/x-php',
                    'rb': 'text/x-ruby',
                    
                    // Diğer Programlama Dilleri
                    'java': 'text/x-java',
                    'sh': 'text/x-shellscript',
                    'bash': 'text/x-shellscript',
                    'pl': 'text/x-perl',
                    
                    // Veritabanı ve Yapılandırma
                    'sql': 'text/x-sql',
                    'yaml': 'text/yaml',
                    'yml': 'text/yaml',
                    'ini': 'text/plain',
                    'cfg': 'text/plain',
                    'conf': 'text/plain'
                };
    
    // Varsayılan olarak text/plain kullan, uzantı bulunamazsa veya tanımlı değilse
    const contentType = mimeTypes[extension] || 'text/plain';
    
    const blob = new Blob([this.el.editor.value], {type: contentType});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = fileName;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    
    tab.modified = false;
    this.renderTabs();
}

            async saveZip() {
                const tab = this.getActiveTab();
                if(!tab) return;
                const zip = new JSZip();
                zip.file(tab.name, this.el.editor.value);
                const blob = await zip.generateAsync({type: 'blob'});
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = tab.name.replace(/\.[^/.]+$/, '') + '.zip';
                a.click();
                URL.revokeObjectURL(url);
            },

            openSearch() {
                this.el.searchBox.classList.add('show');
                this.el.searchOverlay.classList.add('show');
                this.el.findText.focus();
            },

            closeSearch() {
                this.el.searchBox.classList.remove('show');
                this.el.searchOverlay.classList.remove('show');
            },

            findNext() {
                const text = this.el.findText.value;
                if(!text) return;
                const ed = this.el.editor;
                const content = ed.value;
                let idx = content.indexOf(text, ed.selectionEnd);
                if(idx === -1) idx = content.indexOf(text);
                if(idx === -1) return;
                ed.setSelectionRange(idx, idx + text.length);
                ed.focus();
                ed.scrollTop = (content.substring(0, idx).split('\n').length - 1) * 21 - 100;
            },

            findPrev() {
                const text = this.el.findText.value;
                if(!text) return;
                const ed = this.el.editor;
                const content = ed.value;
                let idx = content.lastIndexOf(text, ed.selectionStart - 1);
                if(idx === -1) idx = content.lastIndexOf(text);
                if(idx === -1) return;
                ed.setSelectionRange(idx, idx + text.length);
                ed.focus();
            },

            replaceOne() {
                const find = this.el.findText.value;
                const replace = this.el.replaceText.value;
                const ed = this.el.editor;
                const sel = ed.value.substring(ed.selectionStart, ed.selectionEnd);
                if(sel === find) this.insertText(replace);
                this.findNext();
            },

            replaceAll() {
                const find = this.el.findText.value;
                const replace = this.el.replaceText.value;
                this.el.editor.value = this.el.editor.value.split(find).join(replace);
                this.el.editor.dispatchEvent(new Event('input'));
            },

            togglePreview() {
                if(!this.el.previewModal.classList.contains('show')) {
                    const name = this.el.filename.value;
                    const content = this.el.editor.value;
                    if(name.match(/\.html?$/i)) {
                        this.el.previewFrame.srcdoc = content;
                    } else {
                        this.el.previewFrame.srcdoc = `<pre style="padding:20px;font-family:monospace;white-space:pre-wrap">${content.replace(/</g, '&lt;')}</pre>`;
                    }
                    this.el.previewModal.classList.add('show');
                } else {
                    this.el.previewModal.classList.remove('show');
                }
            },

            changeFont() {
                this.fontIndex = (this.fontIndex + 1) % this.fontSizes.length;
                document.documentElement.style.setProperty('--font-size', this.fontSizes[this.fontIndex] + 'px');
            },

            toggleTheme() {
                document.body.classList.toggle('light');
            },

            async copy() {
                const text = this.el.editor.value.substring(this.el.editor.selectionStart, this.el.editor.selectionEnd);
                if(text) await navigator.clipboard.writeText(text);
            },

            async cut() {
                const ed = this.el.editor;
                const text = ed.value.substring(ed.selectionStart, ed.selectionEnd);
                if(text) {
                    await navigator.clipboard.writeText(text);
                    ed.setRangeText('', ed.selectionStart, ed.selectionEnd, 'end');
                    ed.dispatchEvent(new Event('input'));
                }
            },

            async paste() {
                try {
                    const text = await navigator.clipboard.readText();
                    this.insertText(text);
                } catch(e) {}
            }
        };

        App.init();
    </script>
</body>
