<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AlpEditör Pro</title>
    <style>
        * { 
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #f2f2f7;
            --header: #f8f8f8;
            --primary: #007AFF;
            --border: #c6c6c8;
            --text: #000000;
            --menu-bg: #ffffff;
            --tab-bg: #e5e5ea;
            --tab-active: #ffffff;
            --line-num: #8e8e93;
            --danger: #ff3b30;
            --success: #34c759;
            --editor-font: 'SF Mono', Monaco, 'Cascadia Code', Consolas, monospace;
            --font-size: 15px;
        }

        .dark {
            --bg: #000000;
            --header: #1c1c1e;
            --primary: #0a84ff;
            --border: #38383a;
            --text: #ffffff;
            --menu-bg: #2c2c2e;
            --tab-bg: #2c2c2e;
            --tab-active: #1c1c1e;
            --line-num: #636366;
        }

        html, body {
            height: 100%;
            height: 100dvh; /* Mobil için dynamic viewport height */
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
        }

        /* Ana Konteyner */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100%;
            height: 100dvh;
        }

        /* Header */
        .header {
            background-color: var(--header);
            border-bottom: 1px solid var(--border);
            padding: 8px 12px;
            padding-top: max(8px, env(safe-area-inset-top));
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            z-index: 100;
        }

        .filename {
            font-size: 15px;
            font-weight: 600;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-right: 10px;
            padding: 6px;
            border-radius: 6px;
            cursor: pointer;
        }

        .filename:active {
            background-color: rgba(128,128,128,0.2);
        }

        .header-btns {
            display: flex;
            gap: 6px;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: transparent;
            color: var(--primary);
            font-size: 20px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:active {
            background-color: rgba(128,128,128,0.2);
        }

        /* Menü */
        .menu {
            position: absolute;
            top: calc(env(safe-area-inset-top) + 50px);
            right: 10px;
            background-color: var(--menu-bg);
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            display: none;
            flex-direction: column;
            min-width: 200px;
            max-height: 70vh;
            overflow-y: auto;
            z-index: 1000;
            border: 1px solid var(--border);
        }

        .menu.show {
            display: flex;
        }

        .menu-section {
            border-bottom: 1px solid var(--border);
            padding: 4px 0;
        }

        .menu-section:last-child {
            border-bottom: none;
        }

        .menu-item {
            padding: 12px 16px;
            font-size: 15px;
            background: transparent;
            border: none;
            color: var(--primary);
            text-align: left;
            width: 100%;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-item:active {
            background-color: rgba(128,128,128,0.2);
        }

        .menu-item.red {
            color: var(--danger);
        }

        .shortcut {
            font-size: 12px;
            color: var(--line-num);
            margin-left: 12px;
        }

        /* Tabs */
        .tabs-wrapper {
            background-color: var(--header);
            border-bottom: 1px solid var(--border);
            display: flex;
            overflow-x: auto;
            scrollbar-width: none;
            flex-shrink: 0;
            -webkit-overflow-scrolling: touch;
        }

        .tabs-wrapper::-webkit-scrollbar {
            display: none;
        }

        .tabs-list {
            display: flex;
        }

        .tab {
            padding: 10px 14px;
            font-size: 13px;
            background-color: var(--tab-bg);
            border-right: 1px solid var(--border);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            max-width: 140px;
            min-width: 80px;
            position: relative;
            user-select: none;
        }

        .tab.active {
            background-color: var(--tab-active);
            font-weight: 600;
        }

        .tab-title {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .tab-close {
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 16px;
            line-height: 1;
            color: var(--line-num);
        }

        .tab-close:active {
            background-color: rgba(255,59,48,0.2);
            color: var(--danger);
        }

        .add-tab {
            padding: 10px 14px;
            background: transparent;
            border: none;
            color: var(--primary);
            font-size: 20px;
            cursor: pointer;
            flex-shrink: 0;
        }

        /* Editor Alanı */
        .editor-container {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
            background-color: var(--tab-active);
        }

        .line-numbers {
            width: 38px;
            background-color: var(--header);
            border-right: 1px solid var(--border);
            padding: 10px 4px;
            font-family: var(--editor-font);
            font-size: 13px;
            line-height: 1.5;
            color: var(--line-num);
            text-align: right;
            overflow: hidden;
            user-select: none;
            flex-shrink: 0;
        }

        .editor-wrapper {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        textarea {
            width: 100%;
            height: 100%;
            border: none;
            outline: none;
            padding: 10px;
            font-family: var(--editor-font);
            font-size: var(--font-size);
            line-height: 1.5;
            background-color: transparent;
            color: var(--text);
            resize: none;
            white-space: pre;
            overflow: auto;
            tab-size: 4;
            -webkit-user-select: text;
            user-select: text;
        }

        textarea::selection {
            background-color: rgba(0,122,255,0.3);
        }

        /* Custom Scrollbar for textarea */
        textarea::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        textarea::-webkit-scrollbar-track {
            background: transparent;
        }

        textarea::-webkit-scrollbar-thumb {
            background-color: var(--line-num);
            border-radius: 4px;
            opacity: 0.5;
        }

        textarea::-webkit-scrollbar-thumb:hover {
            opacity: 0.8;
        }

        /* Alt Toolbar */
        .toolbar {
            background-color: var(--header);
            border-top: 1px solid var(--border);
            padding: 6px;
            display: flex;
            gap: 4px;
            overflow-x: auto;
            scrollbar-width: none;
            flex-shrink: 0;
            -webkit-overflow-scrolling: touch;
        }

        .toolbar::-webkit-scrollbar {
            display: none;
        }

        .tool-btn {
            padding: 8px 12px;
            border: 1px solid var(--border);
            background-color: var(--tab-bg);
            color: var(--text);
            border-radius: 6px;
            font-family: var(--editor-font);
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
        }

        .tool-btn:active {
            background-color: var(--primary);
            color: white;
        }

        /* Yüzen Navigasyon Butonları */
        .float-nav {
            position: fixed;
            right: 15px;
            bottom: calc(60px + env(safe-area-inset-bottom));
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 50;
        }

        .float-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background-color: var(--primary);
            color: white;
            border: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.9;
        }

        .float-btn:active {
            opacity: 1;
            transform: scale(0.95);
        }

        /* Arama Popup - Basit ve Solid */
        .search-popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: var(--menu-bg);
            padding: 16px;
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            display: none;
            flex-direction: column;
            gap: 10px;
            z-index: 2000;
            width: 90%;
            max-width: 320px;
            border: 1px solid var(--border);
        }

        .search-popup.show {
            display: flex;
        }

        .popup-title {
            font-weight: 600;
            font-size: 16px;
            margin-bottom: 4px;
        }

        .search-input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 16px;
            background-color: var(--tab-active);
            color: var(--text);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .search-actions {
            display: flex;
            gap: 8px;
            justify-content: space-between;
            margin-top: 4px;
        }

        .search-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            background-color: var(--tab-bg);
            color: var(--text);
            font-size: 14px;
            cursor: pointer;
            font-weight: 500;
        }

        .search-btn.primary {
            background-color: var(--primary);
            color: white;
        }

        .search-btn:active {
            opacity: 0.8;
        }

        /* Overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0,0,0,0.5);
            display: none;
            z-index: 1999;
        }

        .overlay.show {
            display: block;
        }

        /* Preview */
        .preview-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--bg);
            display: none;
            flex-direction: column;
            z-index: 3000;
        }

        .preview-modal.show {
            display: flex;
        }

        .preview-header {
            background-color: var(--header);
            padding: 12px;
            padding-top: max(12px, env(safe-area-inset-top));
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .preview-frame {
            flex: 1;
            border: none;
            background: white;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background-color: rgba(0,0,0,0.85);
            color: white;
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 14px;
            opacity: 0;
            transition: all 0.3s;
            z-index: 4000;
            pointer-events: none;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        /* Input file gizle */
        input[type="file"] {
            display: none;
        }

        /* Responsive */
        @media (max-width: 380px) {
            .line-numbers {
                width: 32px;
                font-size: 12px;
            }
            textarea {
                font-size: 14px;
            }
        }

        /* Focus görünürlüğü için */
        .editor-focus-overlay {
            display: none;
        }
    </style>
</head>
<body class="dark">
    <div class="app-container">
        <!-- Header -->
        <header class="header">
            <div class="filename" id="fileName" onclick="renameFile()">new.txt</div>
            <div class="header-btns">
                <button class="icon-btn" onclick="togglePreview()" title="Önizleme">▶️</button>
                <button class="icon-btn" onclick="toggleMenu()" title="Menü">•••</button>
            </div>
        </header>

        <!-- Menü -->
        <div class="menu" id="mainMenu">
            <div class="menu-section">
                <button class="menu-item" onclick="openFile()">
                    <span>Aç...</span>
                    <span class="shortcut">Ctrl+O</span>
                </button>
                <button class="menu-item" onclick="saveFile()">
                    <span>Kaydet</span>
                    <span class="shortcut">Ctrl+S</span>
                </button>
                <button class="menu-item" onclick="saveFileAs()">
                    <span>Farklı Kaydet</span>
                </button>
            </div>
            <div class="menu-section">
                <button class="menu-item" onclick="undo()">
                    <span>Geri Al</span>
                    <span class="shortcut">Ctrl+Z</span>
                </button>
                <button class="menu-item" onclick="redo()">
                    <span>İleri Al</span>
                    <span class="shortcut">Ctrl+Y</span>
                </button>
            </div>
            <div class="menu-section">
                <button class="menu-item" onclick="openSearch()">
                    <span>Bul</span>
                    <span class="shortcut">Ctrl+F</span>
                </button>
                <button class="menu-item" onclick="jumpToStart()">
                    <span>En Başa Git</span>
                </button>
                <button class="menu-item" onclick="jumpToEnd()">
                    <span>En Sona Git</span>
                </button>
                <button class="menu-item" onclick="changeFontSize()">
                    <span>Yazı Boyutu</span>
                </button>
                <button class="menu-item" onclick="toggleTheme()">
                    <span>Tema Değiştir</span>
                </button>
            </div>
            <div class="menu-section">
                <button class="menu-item" onclick="execCommand('selectall')">Tümünü Seç</button>
                <button class="menu-item" onclick="execCommand('copy')">Kopyala</button>
                <button class="menu-item" onclick="execCommand('cut')">Kes</button>
                <button class="menu-item" onclick="execCommand('paste')">Yapıştır</button>
                <button class="menu-item red" onclick="clearEditor()">Tümünü Sil</button>
            </div>
        </div>

        <!-- Tabs -->
        <div class="tabs-wrapper" id="tabsContainer">
            <div class="tabs-list" id="tabsList"></div>
            <button class="add-tab" onclick="newTab()">+</button>
        </div>

        <!-- Editor -->
        <div class="editor-container">
            <div class="line-numbers" id="lineNums">1</div>
            <div class="editor-wrapper">
                <textarea id="editor" spellcheck="false" autocapitalize="none" autocomplete="off" autocorrect="off"></textarea>
            </div>
        </div>

        <!-- Toolbar -->
        <div class="toolbar">
            <button class="tool-btn" onclick="insertText('\t')">Tab</button>
            <button class="tool-btn" onclick="insertText('<')">&lt;</button>
            <button class="tool-btn" onclick="insertText('>')">&gt;</button>
            <button class="tool-btn" onclick="insertText('/')">/</button>
            <button class="tool-btn" onclick="insertText('{')">{</button>
            <button class="tool-btn" onclick="insertText('}')">}</button>
            <button class="tool-btn" onclick="insertText(';')">;</button>
            <button class="tool-btn" onclick="insertText('=')">=</button>
            <button class="tool-btn" onclick="insertText('(')">(</button>
            <button class="tool-btn" onclick="insertText(')')">)</button>
            <button class="tool-btn" onclick="insertText('[')">[</button>
            <button class="tool-btn" onclick="insertText(']')">]</button>
            <button class="tool-btn" onclick="insertText('"')>"</button>
            <button class="tool-btn" onclick="insertText("'")>'</button>
        </div>

        <!-- Yüzen Butonlar -->
        <div class="float-nav">
            <button class="float-btn" onclick="scrollEditor('top')" title="En Üste">↑</button>
            <button class="float-btn" onclick="scrollEditor('up')" title="Yukarı">▲</button>
            <button class="float-btn" onclick="scrollEditor('down')" title="Aşağı">▼</button>
            <button class="float-btn" onclick="scrollEditor('bottom')" title="En Alta">↓</button>
        </div>
    </div>

    <!-- Arama Popup -->
    <div class="overlay" id="searchOverlay" onclick="closeSearch()"></div>
    <div class="search-popup" id="searchPopup">
        <div class="popup-title">Bul ve Değiştir</div>
        <input type="text" class="search-input" id="findInput" placeholder="Ara..." onkeypress="if(event.key==='Enter')findNext()">
        <input type="text" class="search-input" id="replaceInput" placeholder="Değiştir (isteğe bağlı)...">
        <div class="search-actions">
            <button class="search-btn" onclick="closeSearch()">Kapat</button>
            <button class="search-btn primary" onclick="findPrev()">← Önceki</button>
            <button class="search-btn primary" onclick="findNext()">Sonraki →</button>
        </div>
        <div class="search-actions" style="margin-top:8px;">
            <button class="search-btn" onclick="replaceOne()" style="flex:1">Değiştir</button>
            <button class="search-btn primary" onclick="replaceAll()" style="flex:1">Tümünü Değiştir</button>
        </div>
    </div>

    <!-- Önizleme -->
    <div class="preview-modal" id="previewModal">
        <div class="preview-header">
            <b>Canlı Önizleme</b>
            <button class="icon-btn" onclick="togglePreview()" style="background:var(--danger);color:white;width:auto;padding:0 16px;border-radius:8px;">Kapat</button>
        </div>
        <iframe class="preview-frame" id="previewFrame"></iframe>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <input type="file" id="fileInput" accept=".txt,.html,.js,.css,.json,.md,.csv,.php,.py">

    <script>
        // ==================== GLOBAL STATE ====================
        window.AppState = {
            tabs: [],
            activeTabId: null,
            counter: 0,
            fontSize: parseInt(localStorage.getItem('editor_font')) || 15,
            isDark: localStorage.getItem('editor_theme') === 'dark'
        };

        const editor = document.getElementById('editor');
        const lineNums = document.getElementById('lineNums');
        const fileName = document.getElementById('fileName');
        const tabsList = document.getElementById('tabsList');
        const mainMenu = document.getElementById('mainMenu');
        const searchPopup = document.getElementById('searchPopup');
        const searchOverlay = document.getElementById('searchOverlay');
        const findInput = document.getElementById('findInput');
        const replaceInput = document.getElementById('replaceInput');
        const previewModal = document.getElementById('previewModal');
        const previewFrame = document.getElementById('previewFrame');

        // ==================== UTILS ====================
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function updateLineNumbers() {
            const lines = editor.value.split('\n').length;
            lineNums.innerHTML = Array(lines).fill(0).map((_, i) => i + 1).join('<br>');
        }

        function getMime(name) {
            const ext = name.split('.').pop().toLowerCase();
            const types = {html:'text/html',htm:'text/html',js:'text/javascript',css:'text/css',json:'application/json',md:'text/markdown',txt:'text/plain'};
            return types[ext] || 'text/plain';
        }

        // ==================== TAB SYSTEM ====================
        function newTab(name = 'new.txt', content = '') {
            window.AppState.counter++;
            const id = window.AppState.counter;
            
            const tab = {
                id: id,
                name: name,
                content: content,
                history: [content],
                historyIdx: 0,
                modified: false
            };
            
            window.AppState.tabs.push(tab);
            renderTabs();
            switchTab(id);
            showToast('Yeni sekme açıldı');
        }

        function renderTabs() {
            tabsList.innerHTML = '';
            window.AppState.tabs.forEach(tab => {
                const div = document.createElement('div');
                div.className = 'tab ' + (tab.id === window.AppState.activeTabId ? 'active' : '');
                div.innerHTML = `
                    <span class="tab-title">${tab.name}${tab.modified ? ' •' : ''}</span>
                    <span class="tab-close" onclick="closeTab(${tab.id}, event)">×</span>
                `;
                div.onclick = (e) => {
                    if(!e.target.classList.contains('tab-close')) switchTab(tab.id);
                };
                tabsList.appendChild(div);
            });
        }

        function switchTab(id) {
            // Mevcut içeriği kaydet
            const current = window.AppState.tabs.find(t => t.id === window.AppState.activeTabId);
            if(current) current.content = editor.value;
            
            window.AppState.activeTabId = id;
            const tab = window.AppState.tabs.find(t => t.id === id);
            if(!tab) return;
            
            editor.value = tab.content;
            fileName.textContent = tab.name;
            updateLineNumbers();
            renderTabs();
        }

        function closeTab(id, event) {
            event.stopPropagation();
            if(window.AppState.tabs.length <= 1) {
                showToast('Son sekme kapatılamaz');
                return;
            }
            
            const idx = window.AppState.tabs.findIndex(t => t.id === id);
            window.AppState.tabs = window.AppState.tabs.filter(t => t.id !== id);
            
            if(window.AppState.activeTabId === id) {
                const newTab = window.AppState.tabs[Math.min(idx, window.AppState.tabs.length-1)];
                switchTab(newTab.id);
            } else {
                renderTabs();
            }
        }

        // ==================== EDITOR OPS ====================
        function insertText(text) {
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            editor.setRangeText(text, start, end, 'end');
            editor.focus();
            onEditorInput();
        }

        function onEditorInput() {
            updateLineNumbers();
            const tab = window.AppState.tabs.find(t => t.id === window.AppState.activeTabId);
            if(tab) {
                tab.modified = true;
                tab.content = editor.value;
                renderTabs();
            }
        }

        editor.addEventListener('input', onEditorInput);
        editor.addEventListener('scroll', () => {
            lineNums.scrollTop = editor.scrollTop;
        });

        // ==================== FILE OPS ====================
        function openFile() {
            document.getElementById('fileInput').click();
            toggleMenu();
        }

        document.getElementById('fileInput').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(!file) return;
            
            const reader = new FileReader();
            reader.onload = (evt) => {
                newTab(file.name, evt.target.result);
            };
            reader.readAsText(file);
            e.target.value = '';
        });

        function saveFile() {
            const tab = window.AppState.tabs.find(t => t.id === window.AppState.activeTabId);
            if(!tab) return;
            
            const blob = new Blob([editor.value], {type: getMime(tab.name)});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = tab.name;
            a.click();
            URL.revokeObjectURL(url);
            
            tab.modified = false;
            renderTabs();
            showToast('Kaydedildi');
            toggleMenu();
        }

        function saveFileAs() {
            const tab = window.AppState.tabs.find(t => t.id === window.AppState.activeTabId);
            if(!tab) return;
            
            const newName = prompt('Dosya adı:', tab.name);
            if(newName) {
                tab.name = newName;
                fileName.textContent = newName;
                saveFile();
            }
        }

        function renameFile() {
            const tab = window.AppState.tabs.find(t => t.id === window.AppState.activeTabId);
            if(!tab) return;
            
            const newName = prompt('Yeni dosya adı:', tab.name);
            if(newName) {
                tab.name = newName;
                fileName.textContent = newName;
                renderTabs();
            }
        }

        function clearEditor() {
            if(confirm('Tüm içerik silinsin mi?')) {
                editor.value = '';
                onEditorInput();
                toggleMenu();
            }
        }

        // ==================== HISTORY ====================
        function saveHistory() {
            const tab = window.AppState.tabs.find(t => t.id === window.AppState.activeTabId);
            if(!tab) return;
            
            if(tab.historyIdx < tab.history.length - 1) {
                tab.history = tab.history.slice(0, tab.historyIdx + 1);
            }
            tab.history.push(editor.value);
            tab.historyIdx++;
            if(tab.history.length > 30) {
                tab.history.shift();
                tab.historyIdx--;
            }
        }

        function undo() {
            const tab = window.AppState.tabs.find(t => t.id === window.AppState.activeTabId);
            if(!tab || tab.historyIdx <= 0) return;
            
            tab.historyIdx--;
            editor.value = tab.history[tab.historyIdx];
            onEditorInput();
            toggleMenu();
        }

        function redo() {
            const tab = window.AppState.tabs.find(t => t.id === window.AppState.activeTabId);
            if(!tab || tab.historyIdx >= tab.history.length - 1) return;
            
            tab.historyIdx++;
            editor.value = tab.history[tab.historyIdx];
            onEditorInput();
            toggleMenu();
        }

        // ==================== SEARCH ====================
        function openSearch() {
            searchPopup.classList.add('show');
            searchOverlay.classList.add('show');
            findInput.focus();
            toggleMenu();
        }

        function closeSearch() {
            searchPopup.classList.remove('show');
            searchOverlay.classList.remove('show');
        }

        function findNext() {
            const text = findInput.value;
            if(!text) return;
            
            const content = editor.value;
            const start = editor.selectionEnd;
            const idx = content.indexOf(text, start);
            
            if(idx !== -1) {
                editor.setSelectionRange(idx, idx + text.length);
                editor.focus();
            } else {
                // Baştan ara
                const idx2 = content.indexOf(text);
                if(idx2 !== -1) {
                    editor.setSelectionRange(idx2, idx2 + text.length);
                    editor.focus();
                } else {
                    showToast('Bulunamadı');
                }
            }
        }

        function findPrev() {
            const text = findInput.value;
            if(!text) return;
            
            const content = editor.value;
            const start = editor.selectionStart - 1;
            const idx = content.lastIndexOf(text, start);
            
            if(idx !== -1) {
                editor.setSelectionRange(idx, idx + text.length);
                editor.focus();
            } else {
                // Sondan ara
                const idx2 = content.lastIndexOf(text);
                if(idx2 !== -1) {
                    editor.setSelectionRange(idx2, idx2 + text.length);
                    editor.focus();
                } else {
                    showToast('Bulunamadı');
                }
            }
        }

        function replaceOne() {
            const find = findInput.value;
            const replace = replaceInput.value;
            if(!find) return;
            
            const start = editor.selectionStart;
            const end = editor.selectionEnd;
            const selected = editor.value.substring(start, end);
            
            if(selected.toLowerCase() === find.toLowerCase()) {
                editor.setRangeText(replace, start, end, 'end');
                onEditorInput();
                findNext();
            } else {
                findNext();
            }
        }

        function replaceAll() {
            const find = findInput.value;
            const replace = replaceInput.value;
            if(!find) return;
            
            const original = editor.value;
            const regex = new RegExp(find.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'g');
            const result = original.replace(regex, replace);
            
            if(original !== result) {
                editor.value = result;
                onEditorInput();
                showToast((original.split(find).length - 1) + ' değişiklik yapıldı');
            } else {
                showToast('Değiştirilecek metin bulunamadı');
            }
        }

        // ==================== NAVIGATION ====================
        function scrollEditor(direction) {
            const lineHeight = 24; // yaklaşık satır yüksekliği
            const visibleHeight = editor.clientHeight;
            
            switch(direction) {
                case 'top':
                    editor.scrollTop = 0;
                    editor.setSelectionRange(0, 0);
                    break;
                case 'bottom':
                    editor.scrollTop = editor.scrollHeight;
                    editor.setSelectionRange(editor.value.length, editor.value.length);
                    break;
                case 'up':
                    editor.scrollBy({top: -visibleHeight + 50, behavior: 'smooth'});
                    break;
                case 'down':
                    editor.scrollBy({top: visibleHeight - 50, behavior: 'smooth'});
                    break;
            }
            editor.focus();
        }

        function jumpToStart() {
            editor.setSelectionRange(0, 0);
            editor.scrollTop = 0;
            editor.focus();
            toggleMenu();
        }

        function jumpToEnd() {
            const len = editor.value.length;
            editor.setSelectionRange(len, len);
            editor.scrollTop = editor.scrollHeight;
            editor.focus();
            toggleMenu();
        }

        // ==================== UI CONTROLS ====================
        function toggleMenu() {
            mainMenu.classList.toggle('show');
        }

        function toggleTheme() {
            document.body.classList.toggle('dark');
            const isDark = document.body.classList.contains('dark');
            localStorage.setItem('editor_theme', isDark ? 'dark' : 'light');
            showToast(isDark ? 'Karanlık tema' : 'Açık tema');
            toggleMenu();
        }

        function changeFontSize() {
            const current = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--font-size'));
            const sizes = [12, 14, 15, 16, 18, 20, 22, 24];
            const idx = sizes.indexOf(current);
            const next = sizes[(idx + 1) % sizes.length];
            
            document.documentElement.style.setProperty('--font-size', next + 'px');
            localStorage.setItem('editor_font', next);
            showToast('Yazı boyutu: ' + next + 'px');
            toggleMenu();
        }

        function togglePreview() {
            const isActive = previewModal.classList.contains('show');
            
            if(!isActive) {
                const name = fileName.textContent;
                const content = editor.value;
                
                if(name.endsWith('.html') || name.endsWith('.htm')) {
                    previewFrame.srcdoc = content;
                } else {
                    // Diğer dosyaları formatla
                    const escaped = content
                        .replace(/&/g, '&amp;')
                        .replace(/</g, '&lt;')
                        .replace(/>/g, '&gt;')
                        .replace(/\n/g, '<br>')
                        .replace(/\s/g, '&nbsp;');
                    previewFrame.srcdoc = `<pre style="padding:20px;font-family:monospace;white-space:pre-wrap;">${escaped}</pre>`;
                }
                previewModal.classList.add('show');
            } else {
                previewModal.classList.remove('show');
                previewFrame.srcdoc = '';
            }
        }

        function execCommand(cmd) {
            editor.focus();
            document.execCommand(cmd, false, null);
            toggleMenu();
        }

        // ==================== KEYBOARD SHORTCUTS ====================
        editor.addEventListener('keydown', (e) => {
            // Tab tuşu
            if(e.key === 'Tab') {
                e.preventDefault();
                insertText('    ');
                return;
            }
            
            // Ctrl/Cmd shortcuts
            if(e.ctrlKey || e.metaKey) {
                switch(e.key.toLowerCase()) {
                    case 's':
                        e.preventDefault();
                        if(e.shiftKey) saveFileAs();
                        else saveFile();
                        break;
                    case 'o':
                        e.preventDefault();
                        openFile();
                        break;
                    case 'z':
                        e.preventDefault();
                        undo();
                        break;
                    case 'y':
                        e.preventDefault();
                        redo();
                        break;
                    case 'f':
                        e.preventDefault();
                        openSearch();
                        break;
                    case 'n':
                        e.preventDefault();
                        newTab();
                        break;
                }
            }
        });

        // ==================== INIT ====================
        window.onload = () => {
            // Theme
            if(localStorage.getItem('editor_theme') === 'light') {
                document.body.classList.remove('dark');
            }
            
            // Font size
            const savedSize = localStorage.getItem('editor_font');
            if(savedSize) {
                document.documentElement.style.setProperty('--font-size', savedSize + 'px');
            }
            
            // İlk sekme
            newTab();
            
            // Menü dışı tıklama
            document.addEventListener('click', (e) => {
                if(!mainMenu.contains(e.target) && !e.target.closest('.icon-btn[onclick="toggleMenu()"]')) {
                    mainMenu.classList.remove('show');
                }
            });
        };

        // Sayfa kapanırken uyarı
        window.onbeforeunload = () => {
            const hasModified = window.AppState.tabs.some(t => t.modified);
            if(hasModified) return 'Kaydedilmemiş değişiklikler var. Çıkmak istiyor musunuz?';
        };
    </script>
</body>
</html>
